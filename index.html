{title:'Custom Hook with useRef',t:'hooks',points:8,
code:`function useStopwatch() {
  const [seconds, setSeconds] = useState(0);
  const [isRunning, setIsRunning] = useState(false);
  const intervalRef = useRef(null);

  const start = () => {
    if (!isRunning) {
      setIsRunning(true);
      intervalRef.current = setInterval(() => {
        setSeconds(s => s + 1);
      }, 1000);
    }
  };

  const stop = () => {
    clearInterval(intervalRef.current);
    setIsRunning(false);
  };

  const reset = () => {
    clearInterval(intervalRef.current);
    setIsRunning(false);
    setSeconds(0);
  };

  useEffect(() => {
    return () => clearInterval(intervalRef.current);
  }, []);

  return { seconds, isRunning, start, stop, reset };
}`,
parts:[
{q:'Why is intervalRef using useRef instead of useState? What would happen if you used useState instead?',
a:`useRef is used because:
1. The interval ID doesn't need to be displayed in the UI — it's an internal implementation detail
2. Changing useRef.current does NOT trigger a re-render, which is desired
3. useRef persists the value across renders so we can clear it later

If useState were used instead:
1. Every time we store the interval ID, it would trigger an unnecessary re-render
2. The component would re-render just to store an internal value the user never sees
3. This wastes performance for no benefit

Rule: Use useState for values displayed in UI. Use useRef for internal values (timer IDs, DOM refs, previous values).`},
{q:'What does the useEffect cleanup function do here? When does it run and why is it important?',
a:`The cleanup function: return () => clearInterval(intervalRef.current)

When it runs:
- With empty deps [], it runs only when the component unmounts (is removed from the DOM)

Why it's important:
- Without it, if the component unmounts while the stopwatch is running, the setInterval keeps firing
- This causes a memory leak — the callback tries to call setSeconds on an unmounted component
- React would warn: "Can't perform a state update on an unmounted component"
- The cleanup ensures the interval is always cleared when the component is removed`},
{q:'Why does setSeconds use the functional updater form (s => s + 1) instead of setSeconds(seconds + 1)?',
a:`The functional updater form s => s + 1 is necessary because:

1. The setInterval callback creates a closure over the initial 'seconds' value
2. If we used setSeconds(seconds + 1), 'seconds' would always be 0 (the value when the interval was created)
3. The counter would be stuck at 1 forever: 0 + 1 = 1, 0 + 1 = 1, 0 + 1 = 1...

With s => s + 1:
1. React passes the CURRENT state value as 's'
2. Each call gets the latest value: 0→1, 1→2, 2→3...
3. This is called the "functional updater pattern" — it avoids stale closure bugs

This is a common pitfall with setInterval and setTimeout callbacks in React.`}
]},

{title:'Redux Connect Pattern',t:'redux',points:8,
code:`// store/restaurants/actions.js
export const STORE_RESTAURANTS = 'STORE_RESTAURANTS';
export const storeRestaurants = (records) => ({
  type: STORE_RESTAURANTS,
  payload: records,
});
export const loadRestaurants = () =>
  async (dispatch, getState, api) => {
    const records = await api.loadRestaurants();
    dispatch(storeRestaurants(records));
  };

// store/restaurants/reducers.js
const initialState = { records: [] };
export default function restaurantsReducer(state = initialState, action) {
  switch (action.type) {
    case 'STORE_RESTAURANTS':
      return { ...state, records: action.payload };
    default:
      return state;
  }
}

// RestaurantList.js
import { connect } from 'react-redux';
import { loadRestaurants } from '../store/restaurants/actions';

export function RestaurantList({ restaurants, loadRestaurants }) {
  useEffect(() => {
    loadRestaurants();
  }, [loadRestaurants]);

  return (
    <ul>
      {restaurants.map(r => <li key={r.id}>{r.name}</li>)}
    </ul>
  );
}

const mapStateToProps = (state) => ({
  restaurants: state.restaurants.records,
});
const mapDispatchToProps = { loadRestaurants };
export default connect(mapStateToProps, mapDispatchToProps)(RestaurantList);`,
parts:[
{q:'Why does RestaurantList have both a named export and a default export? How does this help with testing?',
a:`Named export (export function RestaurantList):
- Exports the UNCONNECTED component — no Redux store needed
- Used in unit tests: import { RestaurantList } from './RestaurantList'
- Tests can pass mock props directly without setting up a Redux store

Default export (export default connect(...)(RestaurantList)):
- Exports the CONNECTED component — wired to the Redux store
- Used in the actual application
- Automatically receives state and dispatch via connect()

This pattern enables easy unit testing: you test the unconnected component with jest.fn() mocks, avoiding the complexity of setting up a real Redux store in every test.`},
{q:'Trace the data flow when the component mounts: what happens from useEffect to the UI updating?',
a:`1. Component mounts → useEffect runs (empty-ish deps)
2. Calls loadRestaurants() (which is wrapped in dispatch by connect)
3. Redux dispatches the thunk function
4. Thunk middleware calls the async function with (dispatch, getState, api)
5. api.loadRestaurants() makes the HTTP request and returns data
6. dispatch(storeRestaurants(records)) is called with the data
7. storeRestaurants creates action: { type: 'STORE_RESTAURANTS', payload: records }
8. The action reaches restaurantsReducer
9. Reducer matches 'STORE_RESTAURANTS' and returns new state: { records: [...data] }
10. Redux store updates → connect detects state change via mapStateToProps
11. restaurants prop changes → component re-renders with the restaurant list`},
{q:'What does mapDispatchToProps: { loadRestaurants } do? How is this different from calling store.dispatch() directly?',
a:`The object shorthand { loadRestaurants } does:
1. Takes the loadRestaurants action creator
2. Automatically wraps it: (...args) => dispatch(loadRestaurants(...args))
3. Passes the wrapped version as a prop to the component

So when the component calls props.loadRestaurants(), it actually calls dispatch(loadRestaurants()).

This is different from store.dispatch() because:
- Components don't need to import or know about the store
- Components receive action creators as regular props
- Makes components reusable and testable — just pass mock functions as props
- Follows the principle of separation of concerns`}
]},

{title:'Firebase Auth Middleware',t:'reducer',points:8,
code:`// server.js
const admin = require('firebase-admin');
const serviceAccount = require('./serviceAccountKey.json');
admin.initializeApp({
  credential: admin.credential.cert(serviceAccount)
});

const checkAuth = async (req, res, next) => {
  const authHeader = req.headers.authorization;
  if (!authHeader || !authHeader.startsWith('Bearer ')) {
    return res.status(401).json({ error: 'No token provided' });
  }
  const token = authHeader.split('Bearer ')[1];
  try {
    const decoded = await admin.auth().verifyIdToken(token);
    req.user = decoded;
    next();
  } catch (error) {
    return res.status(401).json({ error: 'Invalid token' });
  }
};

// Usage
app.get('/api/restaurants', checkAuth, (req, res) => {
  // req.user contains the decoded token
  res.json({ restaurants: [...] });
});`,
parts:[
{q:'Walk through what happens when a client sends a request with a valid token. What does each step of checkAuth do?',
a:`1. Client sends: GET /api/restaurants with header "Authorization: Bearer <valid-jwt>"
2. checkAuth middleware runs before the route handler
3. Extracts authHeader from req.headers.authorization
4. Checks if header exists and starts with 'Bearer ' — it does, so continues
5. Splits on 'Bearer ' to extract just the token string
6. Calls admin.auth().verifyIdToken(token) — Firebase Admin SDK checks:
   - Token signature is valid (cryptographically signed by Firebase)
   - Token has not expired (tokens last 1 hour)
   - Token was issued for this Firebase project
7. Returns decoded token containing user info (uid, email, etc.)
8. Attaches decoded info to req.user so the route handler can access it
9. Calls next() to pass control to the route handler
10. Route handler can now use req.user to identify the authenticated user`},
{q:'What is the difference between the firebase package and firebase-admin? Why must the service account key never be committed to git?',
a:`firebase (client-side):
- Runs in the browser
- Used for user-facing operations: signIn, signOut, getIdToken
- Has limited permissions — can only do what the signed-in user is authorized to do

firebase-admin (server-side):
- Runs on the server (Node.js)
- Used for admin operations: verifyIdToken, manage users, access all data
- Has FULL admin access to the Firebase project — bypasses all security rules

The service account key must never be committed because:
- It grants FULL unrestricted access to the entire Firebase project
- Anyone with the key can read/write all data, delete users, etc.
- Must be in .gitignore and stored securely (environment variables or secret managers)
- If exposed, the project is completely compromised`}
]},

{title:'Memoization in Context Provider',t:'memo',points:8,
code:`function SearchableList({ items }) {
  const [searchTerm, setSearchTerm] = useState('');
  const [sortOrder, setSortOrder] = useState('asc');

  const filteredItems = useMemo(() => {
    console.log('Filtering...');
    return items
      .filter(item =>
        item.name.toLowerCase().includes(searchTerm.toLowerCase())
      )
      .sort((a, b) =>
        sortOrder === 'asc'
          ? a.name.localeCompare(b.name)
          : b.name.localeCompare(a.name)
      );
  }, [items, searchTerm, sortOrder]);

  const handleSearch = useCallback((e) => {
    setSearchTerm(e.target.value);
  }, []);

  return (
    <div>
      <input onChange={handleSearch} value={searchTerm} />
      <button onClick={() => setSortOrder(s => s === 'asc' ? 'desc' : 'asc')}>
        Sort {sortOrder}
      </button>
      <ItemList items={filteredItems} />
    </div>
  );
}

const ItemList = React.memo(({ items }) => {
  console.log('ItemList rendered');
  return (
    <ul>{items.map(item => <li key={item.id}>{item.name}</li>)}</ul>
  );
});`,
parts:[
{q:'When will "Filtering..." be logged? List all the scenarios. When will it NOT be logged?',
a:`"Filtering..." WILL be logged when any dependency of useMemo changes:
1. When 'items' prop changes (parent passes new array)
2. When 'searchTerm' changes (user types in the input)
3. When 'sortOrder' changes (user clicks the sort button)

"Filtering..." will NOT be logged when:
1. Component re-renders for reasons unrelated to these deps (e.g., parent re-renders with same items)
2. Other state in the component changes (if there were any)
3. On initial mount, it WILL log once to compute the initial value

useMemo caches the computed result. Only when a dependency changes does it re-run the factory function.`},
{q:'Why is handleSearch wrapped in useCallback? What would happen without it?',
a:`With useCallback:
- handleSearch maintains the same function reference across renders
- The input component receives the same onChange prop each time
- If the input were wrapped in React.memo, it would skip re-renders

Without useCallback:
- A new function is created every render: (e) => { setSearchTerm(e.target.value) }
- The input receives a "new" onChange prop each render (different reference)
- If a child component uses React.memo, it would still re-render because the prop changed
- In this specific code, the <input> is a native element so it doesn't matter as much
- But it's good practice, especially when passing callbacks to memoized child components`},
{q:'When does ItemList re-render? Why is React.memo used here and how does it interact with useMemo for filteredItems?',
a:`ItemList re-renders only when its 'items' prop changes (shallow comparison by React.memo).

How they work together:
1. useMemo for filteredItems: Only creates a new array when items/searchTerm/sortOrder change
2. React.memo on ItemList: Only re-renders when the items prop reference changes
3. If the parent re-renders but filteredItems hasn't changed (same deps), useMemo returns the SAME array reference
4. React.memo sees the same reference → skips re-rendering ItemList

Without this combination:
- Parent re-render → new filteredItems array (even with same data) → ItemList re-renders
- This wastes time re-rendering potentially hundreds of list items

Key insight: useMemo stabilizes the reference, React.memo checks the reference.`}
]},

{title:'Testing with Jest and RTL',t:'testing',points:8,
code:`// TodoList.test.js
import { render, screen, fireEvent } from '@testing-library/react';
import TodoList from './TodoList';

describe('TodoList', () => {
  let onAddTodo;

  function renderComponent(props = {}) {
    onAddTodo = jest.fn();
    return render(
      <TodoList
        todos={[]}
        onAddTodo={onAddTodo}
        {...props}
      />
    );
  }

  it('displays todo items', () => {
    renderComponent({
      todos: [
        { id: 1, text: 'Buy milk' },
        { id: 2, text: 'Walk dog' }
      ]
    });
    expect(screen.getByText('Buy milk')).toBeInTheDocument();
    expect(screen.getByText('Walk dog')).toBeInTheDocument();
  });

  it('calls onAddTodo with input text when form is submitted', () => {
    renderComponent();
    fireEvent.change(
      screen.getByRole('textbox'),
      { target: { value: 'New todo' } }
    );
    fireEvent.click(screen.getByText('Add'));
    expect(onAddTodo).toHaveBeenCalledWith('New todo');
  });
});`,
parts:[
{q:'Why does renderComponent() create a fresh jest.fn() each time instead of defining onAddTodo once at the top?',
a:`Fresh jest.fn() per test ensures test isolation:

1. Each test gets a clean mock with no call history
2. If test A calls onAddTodo, its .mock.calls won't leak into test B
3. Assertions like toHaveBeenCalledWith only check calls from the current test

If defined once at the top:
- mock.calls would accumulate across tests
- toHaveBeenCalledTimes(1) might fail if a previous test also called it
- Tests become order-dependent — fragile and unreliable

This is the renderComponent helper pattern from the labs: create fresh mocks, render with defaults, allow overrides via props.`},
{q:'What is the difference between getByText, queryByText, and findByText? When would you use each one?',
a:`getByText('X'):
- Returns the element or THROWS if not found
- Use when the element MUST exist
- Example: expect(screen.getByText('Buy milk')).toBeInTheDocument()

queryByText('X'):
- Returns the element or NULL if not found
- Use to assert something does NOT exist
- Example: expect(screen.queryByText('Error')).not.toBeInTheDocument()

findByText('X'):
- Returns a PROMISE that resolves when the element appears
- Use for elements that appear after async operations
- Example: const item = await screen.findByText('Loaded data')

Key rule: getBy for "must exist", queryBy for "must not exist", findBy for "will appear async".`}
]},
];

// ============================================================
// APP STATE
// ============================================================
let appState = {
  page: 'dashboard',
  guideTopic: 'tdd',
  fcIndex: 0, fcFlipped: false, fcTopic: 'all', fcMode: 'all',
  quizTopic: 'tdd', quizIndex: 0, quizAnswered: false, quizSelected: -1, quizScore: 0, quizTotal: 0, quizDone: false,
  codeTopicFilter: 'all', codeIndex: 0,
  mockExam: -1, mockIndex: 0, mockAnswers: [], mockDone: false, mockStartTime: 0, mockTimerInterval: null,
  saIndex: 0, saRevealed: {},
};

// ============================================================
// PROGRESS / LOCAL STORAGE
// ============================================================
function loadProgress() {
  try { return JSON.parse(localStorage.getItem('mse342_progress')) || {}; } catch { return {}; }
}
function saveProgress(p) { localStorage.setItem('mse342_progress', JSON.stringify(p)); }

function getProgress() {
  const p = loadProgress();
  if (!p.quizScores) p.quizScores = {};
  if (!p.fcKnown) p.fcKnown = {};
  if (!p.codeCompleted) p.codeCompleted = {};
  if (!p.mockScores) p.mockScores = [];
  if (!p.lastStudy) p.lastStudy = null;
  if (!p.streak) p.streak = 0;
  return p;
}

function recordQuizScore(topic, score, total) {
  const p = getProgress();
  if (!p.quizScores[topic]) p.quizScores[topic] = [];
  p.quizScores[topic].push({ score, total, date: Date.now() });
  p.lastStudy = new Date().toDateString();
  saveProgress(p);
}

function recordMockScore(examIndex, score, total, breakdown) {
  const p = getProgress();
  p.mockScores.push({ exam: examIndex, score, total, breakdown, date: Date.now() });
  p.lastStudy = new Date().toDateString();
  saveProgress(p);
}

function toggleFcKnown(index) {
  const p = getProgress();
  p.fcKnown[index] = !p.fcKnown[index];
  p.lastStudy = new Date().toDateString();
  saveProgress(p);
}

function markCodeCompleted(index) {
  const p = getProgress();
  p.codeCompleted[index] = true;
  p.lastStudy = new Date().toDateString();
  saveProgress(p);
}

function updateStreak() {
  const p = getProgress();
  const today = new Date().toDateString();
  if (p.lastStudy !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    p.streak = p.lastStudy === yesterday ? p.streak + 1 : 1;
    p.lastStudy = today;
    saveProgress(p);
  }
  const el = document.getElementById('streakDisplay');
  if (el && p.streak > 0) el.textContent = p.streak + ' day streak';
}

// ============================================================
// NAVIGATION
// ============================================================
function navigate(page) {
  if (appState.mockTimerInterval) { clearInterval(appState.mockTimerInterval); appState.mockTimerInterval = null; }
  appState.page = page;
  if (page === 'quiz') { appState.quizIndex = 0; appState.quizScore = 0; appState.quizTotal = 0; appState.quizDone = false; appState.quizAnswered = false; }
  render();
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  document.getElementById('main').scrollTop = 0;
  const sb = document.getElementById('sidebar');
  if (sb.classList.contains('open')) sb.classList.remove('open');
  updateStreak();
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('themeBtn').textContent = next === 'dark' ? '\u263E' : '\u2600';
  localStorage.setItem('mse342_theme', next);
}

// ============================================================
// SYNTAX HIGHLIGHT HELPER
// ============================================================
function hl(code) {
  return code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(\/\/.*)/g,'<span class="cm">$1</span>')
    .replace(/('(?:[^'\\]|\\.)*'|"(?:[^"\\]|\\.)*"|`(?:[^`\\]|\\.)*`)/g,'<span class="str">$1</span>')
    .replace(/\b(const|let|var|function|return|import|export|from|default|async|await|if|else|switch|case|break|try|catch|finally|throw|new|class|extends|this|null|undefined|true|false)\b/g,'<span class="kw">$1</span>')
    .replace(/\b(\d+)\b/g,'<span class="num">$1</span>');
}

// ============================================================
// RENDER FUNCTIONS
// ============================================================
function render() {
  const c = document.getElementById('content');
  switch(appState.page) {
    case 'dashboard': c.innerHTML = renderDashboard(); break;
    case 'guide': c.innerHTML = renderGuide(); break;
    case 'flashcards': c.innerHTML = renderFlashcards(); break;
    case 'quiz': c.innerHTML = renderQuiz(); break;
    case 'code': c.innerHTML = renderCode(); break;
    case 'short': c.innerHTML = renderShortAnswer(); break;
    case 'mock': c.innerHTML = renderMock(); break;
  }
}

// --- Dashboard ---
function renderDashboard() {
  const p = getProgress();
  const totalFC = FLASHCARDS.length;
  const knownFC = Object.values(p.fcKnown).filter(Boolean).length;
  const totalCode = CODE_EXERCISES.length;
  const doneCode = Object.values(p.codeCompleted).filter(Boolean).length;

  let totalQuizQ = 0, totalQuizCorrect = 0;
  TOPICS.forEach(t => {
    const scores = p.quizScores[t.id] || [];
    if (scores.length) {
      const last = scores[scores.length - 1];
      totalQuizQ += last.total;
      totalQuizCorrect += last.score;
    }
  });

  let topicRows = '';
  TOPICS.forEach(t => {
    let mastery = 0, parts = 0;
    const scores = p.quizScores[t.id] || [];
    if (scores.length) { mastery += (scores[scores.length-1].score / scores[scores.length-1].total) * 100; parts++; }
    const tFC = FLASHCARDS.filter(f=>f.t===t.id);
    const tKnown = tFC.filter((_,i)=> {const gi = FLASHCARDS.indexOf(tFC[0])+tFC.indexOf(_); return p.fcKnown[gi];}).length;
    if (tFC.length) { mastery += (tKnown/tFC.length)*100; parts++; }
    const overall = parts ? Math.round(mastery/parts) : 0;
    const color = overall >= 80 ? 'var(--green)' : overall >= 50 ? 'var(--orange)' : 'var(--red)';
    topicRows += `<div class="topic-mastery"><span class="label">${t.name}</span><div class="bar"><div class="progress-bar"><div class="fill" style="width:${overall}%;background:${color}"></div></div></div><span class="pct" style="color:${color}">${overall}%</span></div>`;
  });

  let weakAreas = '', strongAreas = '';
  TOPICS.forEach(t => {
    const scores = p.quizScores[t.id] || [];
    if (scores.length) {
      const last = scores[scores.length-1];
      const pct = Math.round(last.score/last.total*100);
      if (pct < 60) weakAreas += `<div class="weak-area">${t.name} (${pct}%) — Review this topic</div>`;
      else if (pct >= 90) strongAreas += `<div class="strong-area">${t.name} (${pct}%) — Strong</div>`;
    }
  });

  let mockHistory = '';
  p.mockScores.forEach((m,i) => {
    mockHistory += `<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">Exam ${m.exam+1}: ${m.score}/${m.total} (${Math.round(m.score/m.total*100)}%) — ${new Date(m.date).toLocaleDateString()}</div>`;
  });

  return `<div class="fade-in">
<h2 style="margin-bottom:16px">Dashboard</h2>
<div class="exam-format-banner">
  <h3>Final Exam Format — MSE 342</h3>
  <p>Written, closed book, no electronics. <strong>25% of course grade.</strong></p>
  <div class="fmt-grid">
    <div class="fmt-item"><div class="num">62</div><div class="lbl">Multiple Choice (62 pts)</div></div>
    <div class="fmt-item"><div class="num">3</div><div class="lbl">Short Answer (24 pts)</div></div>
    <div class="fmt-item"><div class="num">86</div><div class="lbl">Total Points</div></div>
    <div class="fmt-item"><div class="num">25%</div><div class="lbl">Of Course Grade</div></div>
  </div>
</div>
<div class="dash-grid">
  <div class="dash-card"><h4>Flashcards Mastered</h4><div class="big-num">${knownFC}/${totalFC}</div><div class="progress-bar" style="margin-top:8px"><div class="fill" style="width:${totalFC?knownFC/totalFC*100:0}%"></div></div></div>
  <div class="dash-card"><h4>Code Exercises Done</h4><div class="big-num">${doneCode}/${totalCode}</div><div class="progress-bar" style="margin-top:8px"><div class="fill" style="width:${totalCode?doneCode/totalCode*100:0}%"></div></div></div>
  <div class="dash-card"><h4>Mock Exams Taken</h4><div class="big-num">${p.mockScores.length}</div></div>
  <div class="dash-card"><h4>Study Streak</h4><div class="big-num">${p.streak} day${p.streak!==1?'s':''}</div></div>
</div>
<div class="card"><h3>Topic Mastery</h3>${topicRows}</div>
${weakAreas?`<div class="card"><h3>Areas to Focus On</h3>${weakAreas}</div>`:''}
${strongAreas?`<div class="card"><h3>Strong Areas</h3>${strongAreas}</div>`:''}
${mockHistory?`<div class="card"><h3>Mock Exam History</h3>${mockHistory}</div>`:''}
<div class="card"><h3>Quick Start</h3>
<div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:12px">
<button class="btn btn-primary" onclick="navigate('guide')">Study Guide</button>
<button class="btn btn-secondary" onclick="navigate('flashcards')">Flashcards</button>
<button class="btn btn-secondary" onclick="navigate('quiz')">Take a Quiz</button>
<button class="btn btn-secondary" onclick="navigate('code')">Code Exercises</button>
<button class="btn btn-secondary" onclick="navigate('mock')">Mock Exam</button>
</div></div>
</div>`;
}

// --- Study Guide ---
function renderGuide() {
  const tabs = TOPICS.map(t =>
    `<button class="tab ${appState.guideTopic===t.id?'active':''}" onclick="appState.guideTopic='${t.id}';render()">${t.name}</button>`
  ).join('');
  return `<div class="fade-in"><h2 style="margin-bottom:16px">Study Guide</h2><div class="tabs">${tabs}</div><div class="card">${GUIDE[appState.guideTopic]||'<p>Content coming soon.</p>'}</div></div>`;
}

// --- Flashcards ---
function renderFlashcards() {
  const p = getProgress();
  let cards = FLASHCARDS.map((f,i)=>({...f,gi:i}));
  if (appState.fcTopic !== 'all') cards = cards.filter(f=>f.t===appState.fcTopic);
  if (appState.fcMode === 'learning') cards = cards.filter(f=>!p.fcKnown[f.gi]);

  if (!cards.length) return `<div class="fade-in"><h2>Flashcards</h2><div class="card"><p>No cards match your filter. Try changing the topic or mode.</p></div></div>`;

  if (appState.fcIndex >= cards.length) appState.fcIndex = 0;
  const card = cards[appState.fcIndex];
  const isKnown = p.fcKnown[card.gi];
  const topicName = TOPICS.find(t=>t.id===card.t)?.name || card.t;

  const topicChips = `<button class="topic-chip ${appState.fcTopic==='all'?'active':''}" onclick="appState.fcTopic='all';appState.fcIndex=0;appState.fcFlipped=false;render()">All</button>` +
    TOPICS.map(t=>`<button class="topic-chip ${appState.fcTopic===t.id?'active':''}" onclick="appState.fcTopic='${t.id}';appState.fcIndex=0;appState.fcFlipped=false;render()">${t.name}</button>`).join('');

  return `<div class="fade-in">
<h2 style="margin-bottom:16px">Flashcards</h2>
<div class="fc-filter">${topicChips}</div>
<div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px">
  <button class="btn btn-sm ${appState.fcMode==='all'?'btn-primary':'btn-secondary'}" onclick="appState.fcMode='all';appState.fcIndex=0;appState.fcFlipped=false;render()">All Cards</button>
  <button class="btn btn-sm ${appState.fcMode==='learning'?'btn-primary':'btn-secondary'}" onclick="appState.fcMode='learning';appState.fcIndex=0;appState.fcFlipped=false;render()">Still Learning</button>
  <button class="btn btn-sm btn-secondary" onclick="shuffleFC()">Shuffle</button>
</div>
<div class="flashcard-container">
  <div class="flashcard-progress">${appState.fcIndex+1} / ${cards.length}</div>
  <div class="flashcard ${appState.fcFlipped?'flipped':''}" onclick="appState.fcFlipped=!appState.fcFlipped;render()">
    <div class="flashcard-inner">
      <div class="flashcard-front"><div class="flashcard-topic">${topicName}</div><p>${card.q}</p></div>
      <div class="flashcard-back"><div class="flashcard-topic">Answer</div><p>${card.a}</p></div>
    </div>
  </div>
  <div class="flashcard-controls">
    <button class="btn btn-secondary" onclick="fcPrev()" ${appState.fcIndex===0?'disabled':''}>Previous</button>
    <button class="btn ${isKnown?'btn-success':'btn-secondary'}" onclick="toggleFcKnown(${card.gi});render()">${isKnown?'Known':'Mark Known'}</button>
    <button class="btn btn-primary" onclick="fcNext(${cards.length})">Next</button>
  </div>
</div></div>`;
}

function fcNext(total) { appState.fcIndex = (appState.fcIndex+1)%total; appState.fcFlipped=false; render(); }
function fcPrev() { if(appState.fcIndex>0){appState.fcIndex--;appState.fcFlipped=false;render();} }
function shuffleFC() {
  const arr = [...FLASHCARDS];
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  FLASHCARDS.length=0;FLASHCARDS.push(...arr);
  appState.fcIndex=0;appState.fcFlipped=false;render();
}

// --- Quizzes ---
function renderQuiz() {
  const topicChips = TOPICS.map(t =>
    `<button class="topic-chip ${appState.quizTopic===t.id?'active':''}" onclick="startQuiz('${t.id}')">${t.name}</button>`
  ).join('');

  const questions = QUIZZES[appState.quizTopic] || [];
  if (!questions.length) return `<div class="fade-in"><h2>Quizzes</h2><div class="topic-selector">${topicChips}</div><div class="card"><p>No questions available for this topic yet.</p></div></div>`;

  if (appState.quizDone) {
    const pct = Math.round(appState.quizScore/appState.quizTotal*100);
    return `<div class="fade-in"><h2>Quiz Complete!</h2><div class="card">
      <div class="quiz-score">${pct}%</div>
      <div class="quiz-score-sub">${appState.quizScore} / ${appState.quizTotal} correct</div>
      <div style="text-align:center;margin-top:16px">
        <button class="btn btn-primary" onclick="startQuiz('${appState.quizTopic}')">Retry</button>
        <button class="btn btn-secondary" onclick="navigate('dashboard')" style="margin-left:8px">Dashboard</button>
      </div>
    </div></div>`;
  }

  const qn = questions[appState.quizIndex];
  const opts = qn.o.map((o,i) => {
    let cls = 'quiz-option';
    if (appState.quizAnswered) {
      if (i === qn.a) cls += ' correct';
      else if (i === appState.quizSelected) cls += ' incorrect';
    } else if (i === appState.quizSelected) cls += ' selected';
    return `<button class="${cls}" onclick="selectQuizAnswer(${i})" ${appState.quizAnswered?'disabled':''}>${String.fromCharCode(65+i)}) ${o}</button>`;
  }).join('');

  return `<div class="fade-in">
<h2 style="margin-bottom:16px">Quizzes</h2>
<div class="topic-selector">${topicChips}</div>
<div class="card">
  <div style="display:flex;justify-content:space-between;margin-bottom:12px">
    <span style="font-size:13px;color:var(--text2)">Question ${appState.quizIndex+1} / ${questions.length}</span>
    <span style="font-size:13px;color:var(--text2)">Score: ${appState.quizScore}</span>
  </div>
  <div class="progress-bar" style="margin-bottom:16px"><div class="fill" style="width:${(appState.quizIndex/questions.length)*100}%"></div></div>
  <h3 style="margin-bottom:16px;color:var(--text)">${qn.q}</h3>
  ${opts}
  ${appState.quizAnswered ? `<div class="quiz-explanation"><strong>${appState.quizSelected===qn.a?'Correct!':'Incorrect.'}</strong> ${qn.e}</div>
  <div style="text-align:right;margin-top:12px"><button class="btn btn-primary" onclick="nextQuizQ()">Next</button></div>` : ''}
</div></div>`;
}

function startQuiz(topic) {
  appState.quizTopic = topic; appState.quizIndex = 0; appState.quizScore = 0; appState.quizTotal = 0; appState.quizDone = false; appState.quizAnswered = false; appState.quizSelected = -1;
  render();
}

function selectQuizAnswer(i) {
  if (appState.quizAnswered) return;
  appState.quizSelected = i;
  appState.quizAnswered = true;
  const qn = QUIZZES[appState.quizTopic][appState.quizIndex];
  appState.quizTotal++;
  if (i === qn.a) appState.quizScore++;
  render();
}

function nextQuizQ() {
  const questions = QUIZZES[appState.quizTopic];
  appState.quizIndex++;
  appState.quizAnswered = false;
  appState.quizSelected = -1;
  if (appState.quizIndex >= questions.length) {
    appState.quizDone = true;
    recordQuizScore(appState.quizTopic, appState.quizScore, appState.quizTotal);
  }
  render();
}

// --- Code Fill-in-the-Blank ---
function renderCode() {
  let exercises = CODE_EXERCISES.map((e,i)=>({...e,gi:i}));
  if (appState.codeTopicFilter !== 'all') exercises = exercises.filter(e=>e.t===appState.codeTopicFilter);
  if (!exercises.length) return `<div class="fade-in"><h2>Code Exercises</h2><p>No exercises for this filter.</p></div>`;
  if (appState.codeIndex >= exercises.length) appState.codeIndex = 0;

  const topicChips = `<button class="topic-chip ${appState.codeTopicFilter==='all'?'active':''}" onclick="appState.codeTopicFilter='all';appState.codeIndex=0;render()">All</button>` +
    TOPICS.map(t=>`<button class="topic-chip ${appState.codeTopicFilter===t.id?'active':''}" onclick="appState.codeTopicFilter='${t.id}';appState.codeIndex=0;render()">${t.name}</button>`).join('');

  const ex = exercises[appState.codeIndex];
  let codeHtml = ex.code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  ex.blanks.forEach((b,i) => {
    codeHtml = codeHtml.replace(`___${i+1}___`, `<input type="text" id="blank${i}" placeholder="${ex.hints[i]||'...'}" style="width:${Math.max(b.length*9,80)}px" autocomplete="off" spellcheck="false">`);
  });

  const p = getProgress();
  return `<div class="fade-in">
<h2 style="margin-bottom:16px">Code Exercises</h2>
<div class="topic-selector">${topicChips}</div>
<div class="card">
  <div style="display:flex;justify-content:space-between;margin-bottom:8px">
    <span style="font-size:13px;color:var(--text2)">Exercise ${appState.codeIndex+1} / ${exercises.length}</span>
    <span style="font-size:13px;color:var(--text2)">${p.codeCompleted[ex.gi]?'Completed':'Not completed'}</span>
  </div>
  <h3>${ex.title}</h3>
  <p style="font-size:13px;color:var(--text2);margin-bottom:8px">Fill in the blanks with the correct code:</p>
  <div class="code-exercise"><pre class="code-block">${codeHtml}</pre></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
    <button class="btn btn-primary" onclick="checkCode(${JSON.stringify(ex.blanks).replace(/"/g,'&quot;')}, ${ex.gi})">Check Answers</button>
    <button class="btn btn-secondary" onclick="revealCode(${JSON.stringify(ex.blanks).replace(/"/g,'&quot;')})">Reveal Answers</button>
    <button class="btn btn-secondary" onclick="codeNav(-1,${exercises.length})" ${appState.codeIndex===0?'disabled':''}>Previous</button>
    <button class="btn btn-secondary" onclick="codeNav(1,${exercises.length})">Next</button>
  </div>
</div></div>`;
}

function checkCode(answers, gi) {
  let allCorrect = true;
  answers.forEach((ans, i) => {
    const input = document.getElementById('blank'+i);
    if (!input) return;
    const val = input.value.trim();
    if (val.toLowerCase() === ans.toLowerCase()) {
      input.classList.remove('incorrect-input');
      input.classList.add('correct-input');
    } else {
      input.classList.remove('correct-input');
      input.classList.add('incorrect-input');
      allCorrect = false;
    }
  });
  if (allCorrect) markCodeCompleted(gi);
}

function revealCode(answers) {
  answers.forEach((ans, i) => {
    const input = document.getElementById('blank'+i);
    if (input) { input.value = ans; input.classList.add('correct-input'); input.classList.remove('incorrect-input'); }
  });
}

function codeNav(dir, total) {
  appState.codeIndex = Math.max(0, Math.min(total-1, appState.codeIndex+dir));
  render();
}

// --- Mock Exams ---
// --- Short Answer ---
function renderShortAnswer() {
  const sa = SHORT_ANSWERS[appState.saIndex];
  const topicName = TOPICS.find(t=>t.id===sa.t)?.name || sa.t;

  const partsHtml = sa.parts.map((part, pi) => {
    const key = appState.saIndex + '-' + pi;
    const revealed = appState.saRevealed[key];
    return `<div class="sa-part">
      <div class="sa-part-label">Part ${String.fromCharCode(65+pi)}</div>
      <p style="margin-bottom:12px;font-size:15px">${part.q}</p>
      <textarea class="sa-textarea" placeholder="Write your answer here..." id="sa-input-${pi}"></textarea>
      <div style="margin-top:8px">
        <button class="btn btn-sm ${revealed?'btn-success':'btn-primary'}" onclick="revealSA(${pi})">
          ${revealed ? 'Answer Shown' : 'Show Model Answer'}
        </button>
      </div>
      ${revealed ? `<div class="sa-model-answer"><h4>Model Answer</h4><pre style="white-space:pre-wrap;font-family:inherit;font-size:inherit">${part.a.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre></div>` : ''}
    </div>`;
  }).join('');

  return `<div class="fade-in">
<h2 style="margin-bottom:8px">Short Answer Practice</h2>
<div class="exam-format-banner">
  <h3>Exam Format</h3>
  <p>The exam has <strong>3 short-answer questions with multiple parts</strong> worth <strong>24 points</strong> (28% of the exam). You'll be given code and asked to trace execution, explain concepts, and write code.</p>
  <div class="fmt-grid">
    <div class="fmt-item"><div class="num">62</div><div class="lbl">Multiple Choice (62 pts)</div></div>
    <div class="fmt-item"><div class="num">3</div><div class="lbl">Short Answer (24 pts)</div></div>
    <div class="fmt-item"><div class="num">86</div><div class="lbl">Total Points</div></div>
  </div>
</div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
  <span style="color:var(--text2);font-size:14px">Question ${appState.saIndex+1} / ${SHORT_ANSWERS.length} &middot; ${topicName}</span>
  <div style="display:flex;gap:6px">
    <button class="btn btn-sm btn-secondary" onclick="saNav(-1)" ${appState.saIndex===0?'disabled':''}>Previous</button>
    <button class="btn btn-sm btn-secondary" onclick="saNav(1)" ${appState.saIndex>=SHORT_ANSWERS.length-1?'disabled':''}>Next</button>
  </div>
</div>
<div class="card">
  <h3>${sa.title} <span style="font-size:13px;color:var(--text2);font-weight:400">(${sa.points} points)</span></h3>
  <p style="margin:8px 0 12px;font-size:13px;color:var(--text2)">Given the following code, answer the questions below:</p>
  <pre class="code-block">${hl(sa.code)}</pre>
  ${partsHtml}
</div></div>`;
}

function revealSA(pi) {
  const key = appState.saIndex + '-' + pi;
  appState.saRevealed[key] = true;
  render();
}

function saNav(dir) {
  appState.saIndex = Math.max(0, Math.min(SHORT_ANSWERS.length - 1, appState.saIndex + dir));
  render();
  document.getElementById('main').scrollTop = 0;
}

// --- Mock Exams ---
function renderMock() {
  if (appState.mockExam === -1) {
    const p = getProgress();
    const examCards = MOCK_EXAMS.map((exam, i) => {
      const taken = p.mockScores.filter(m=>m.exam===i);
      const best = taken.length ? Math.max(...taken.map(t=>Math.round(t.score/t.total*100))) : null;
      return `<div class="card" style="cursor:pointer" onclick="startMock(${i})">
        <h3>Mock Exam ${i+1}</h3>
        <p style="color:var(--text2)">${exam.length} questions &middot; ~60 minutes</p>
        ${best !== null ? `<p style="margin-top:8px">Best: <strong style="color:var(--accent)">${best}%</strong> (${taken.length} attempt${taken.length>1?'s':''})</p>` : '<p style="margin-top:8px;color:var(--text2)">Not attempted</p>'}
        <button class="btn btn-primary" style="margin-top:12px">Start Exam</button>
      </div>`;
    }).join('');
    return `<div class="fade-in"><h2 style="margin-bottom:16px">Mock Exams</h2>
<div class="exam-format-banner">
  <h3>Real Exam Format</h3>
  <p>The actual exam has <strong>62 multiple-choice</strong> (62 pts) + <strong>3 short-answer</strong> (24 pts) = 86 points total. These mock exams cover the MC portion. Use <strong>Short Answer Practice</strong> for the written portion.</p>
  <div style="margin-top:8px"><button class="btn btn-sm btn-secondary" onclick="navigate('short')">Go to Short Answer Practice</button></div>
</div>
${examCards}</div>`;
  }

  const exam = MOCK_EXAMS[appState.mockExam];
  if (appState.mockDone) {
    const score = appState.mockAnswers.reduce((s,a,i)=>s+(a===exam[i].a?1:0),0);
    const pct = Math.round(score/exam.length*100);
    const breakdown = {};
    exam.forEach((q,i)=>{ if(!breakdown[q.t])breakdown[q.t]={c:0,t:0}; breakdown[q.t].t++; if(appState.mockAnswers[i]===q.a)breakdown[q.t].c++; });
    recordMockScore(appState.mockExam, score, exam.length, breakdown);

    let bdHtml = '';
    Object.entries(breakdown).forEach(([tid,v])=>{
      const tn = TOPICS.find(t=>t.id===tid)?.name||tid;
      const p2 = Math.round(v.c/v.t*100);
      const col = p2>=80?'var(--green)':p2>=50?'var(--orange)':'var(--red)';
      bdHtml += `<div class="topic-mastery"><span class="label">${tn}</span><div class="bar"><div class="progress-bar"><div class="fill" style="width:${p2}%;background:${col}"></div></div></div><span class="pct" style="color:${col}">${v.c}/${v.t}</span></div>`;
    });

    let reviewHtml = '';
    exam.forEach((q,i)=>{
      const correct = appState.mockAnswers[i]===q.a;
      reviewHtml += `<div style="padding:12px 0;border-bottom:1px solid var(--border)">
        <p style="font-weight:600;${correct?'':'color:var(--red)'}">${i+1}. ${q.q}</p>
        <p style="font-size:13px;margin-top:4px">Your answer: <strong>${q.o[appState.mockAnswers[i]]||'(skipped)'}</strong> ${correct?'&#10004;':'&#10008; Correct: <strong>'+q.o[q.a]+'</strong>'}</p>
        <p style="font-size:13px;color:var(--text2);margin-top:2px">${q.e}</p>
      </div>`;
    });

    return `<div class="fade-in"><h2>Exam Complete!</h2>
    <div class="card"><div class="quiz-score">${pct}%</div><div class="quiz-score-sub">${score} / ${exam.length} correct</div></div>
    <div class="card"><h3>Topic Breakdown</h3>${bdHtml}</div>
    <div class="card"><h3>Review All Questions</h3>${reviewHtml}</div>
    <div style="text-align:center;margin-top:16px"><button class="btn btn-primary" onclick="appState.mockExam=-1;appState.mockDone=false;render()">Back to Exams</button></div></div>`;
  }

  const elapsed = Math.floor((Date.now()-appState.mockStartTime)/1000);
  const mins = Math.floor(elapsed/60), secs = elapsed%60;
  const timeStr = `${mins}:${secs<10?'0':''}${secs}`;
  const timeCls = mins >= 55 ? 'danger' : mins >= 45 ? 'warning' : '';
  const qn = exam[appState.mockIndex];
  const answered = appState.mockAnswers[appState.mockIndex] !== undefined;

  const opts = qn.o.map((o,i) => {
    let cls = 'quiz-option';
    if (appState.mockAnswers[appState.mockIndex] === i) cls += ' selected';
    return `<button class="${cls}" onclick="selectMockAnswer(${i})">${String.fromCharCode(65+i)}) ${o}</button>`;
  }).join('');

  const navDots = exam.map((_,i)=>{
    const a = appState.mockAnswers[i];
    const cls = i===appState.mockIndex?'background:var(--accent)': a!==undefined?'background:var(--green)':'background:var(--bg4)';
    return `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;${cls};cursor:pointer;margin:2px" onclick="appState.mockIndex=${i};render()"></span>`;
  }).join('');

  return `<div class="fade-in">
<div class="mock-timer">
  <span style="font-size:14px">Question ${appState.mockIndex+1}/${exam.length}</span>
  <span class="time ${timeCls}">${timeStr}</span>
  <button class="btn btn-danger btn-sm" onclick="finishMock()">Finish Exam</button>
</div>
<div class="card">
  <h3 style="margin-bottom:16px">${qn.q}</h3>
  ${opts}
  <div style="display:flex;justify-content:space-between;margin-top:16px">
    <button class="btn btn-secondary" onclick="mockNav(-1)" ${appState.mockIndex===0?'disabled':''}>Previous</button>
    <button class="btn btn-primary" onclick="mockNav(1)">${appState.mockIndex===exam.length-1?'Review / Finish':'Next'}</button>
  </div>
</div>
<div style="text-align:center;margin-top:12px">${navDots}</div></div>`;
}

function startMock(i) {
  appState.mockExam = i;
  appState.mockIndex = 0;
  appState.mockAnswers = [];
  appState.mockDone = false;
  appState.mockStartTime = Date.now();
  if (appState.mockTimerInterval) clearInterval(appState.mockTimerInterval);
  appState.mockTimerInterval = setInterval(()=>{
    const el = document.querySelector('.mock-timer .time');
    if (!el) return;
    const elapsed = Math.floor((Date.now()-appState.mockStartTime)/1000);
    const m = Math.floor(elapsed/60), s = elapsed%60;
    el.textContent = `${m}:${s<10?'0':''}${s}`;
    el.className = 'time' + (m>=55?' danger':m>=45?' warning':'');
  }, 1000);
  render();
}

function selectMockAnswer(i) { appState.mockAnswers[appState.mockIndex] = i; render(); }
function mockNav(dir) {
  const exam = MOCK_EXAMS[appState.mockExam];
  if (dir === 1 && appState.mockIndex === exam.length - 1) { finishMock(); return; }
  appState.mockIndex = Math.max(0, Math.min(exam.length-1, appState.mockIndex+dir));
  render();
}
function finishMock() {
  if (appState.mockTimerInterval) { clearInterval(appState.mockTimerInterval); appState.mockTimerInterval = null; }
  appState.mockDone = true;
  render();
}

  const saved = localStorage.getItem('mse342_theme');
  if (saved) { document.documentElement.dataset.theme = saved; document.getElementById('themeBtn').textContent = saved==='dark'?'\u263E':'\u2600'; }
  updateStreak();

})();
</script>
