<style>
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#242836;--bg4:#2e3345;--text:#e4e7ef;--text2:#a0a7bf;--accent:#6c8cff;--accent2:#4a6aef;--green:#4cdf7c;--red:#ff5e6e;--orange:#ffad42;--yellow:#ffe066;--border:#2e3345;--card:#1a1d27;--code-bg:#161922;--shadow:0 4px 24px rgba(0,0,0,.4);--radius:12px;--sidebar-w:260px;--header-h:56px}
[data-theme="light"]{--bg:#f5f6fa;--bg2:#ffffff;--bg3:#ebedf5;--bg4:#dde0ec;--text:#1a1d27;--text2:#5a6078;--accent:#4a6aef;--accent2:#3850d0;--green:#1fa855;--red:#d93848;--orange:#e89520;--yellow:#c8a800;--border:#dde0ec;--card:#ffffff;--code-bg:#f0f1f6;--shadow:0 4px 24px rgba(0,0,0,.08)}

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow:hidden;height:100vh}

.sidebar .nav-item{display:flex;align-items:center;gap:10px;padding:8px 20px;font-size:14px;color:var(--text2);cursor:pointer;transition:.15s;border-left:3px solid transparent}

.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin:16px 0}

.topic-mastery{display:flex;align-items:center;gap:12px;padding:8px 0}
.topic-mastery .label{flex:1;font-size:14px}
.topic-mastery .bar{flex:2}
.topic-mastery .pct{width:44px;text-align:right;font-size:14px;font-weight:600}
.weak-area{background:rgba(255,94,110,.1);border:1px solid rgba(255,94,110,.3);border-radius:8px;padding:12px 16px;margin:6px 0;font-size:14px}

.tabs{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:20px;overflow-x:auto}

.topic-selector{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}

.topic-chip:hover,.topic-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

<header class="header">
  <div style="display:flex;align-items:center;gap:12px">

<script>
// ============================================================
// DATA: Topics
// ============================================================
const TOPICS = [
  {id:'tdd',name:'TDD Basics',week:'Week 5'},
  {id:'outside-in',name:'Outside-In TDD',week:'Weeks 5-6'},
  {id:'testing',name:'Testing Deep Dive',week:'Week 8'},
  {id:'redux',name:'Redux',week:'Week 9'},
  {id:'context',name:'React Context API',week:'Week 10'},
  {id:'reducer',name:'useReducer & Firebase',week:'Week 11'},
  {id:'memo',name:'Memoization',week:'Week 11'},
  {id:'hooks',name:'Custom Hooks & useRef',week:'Week 12'},
  {id:'comparisons',name:'Key Comparisons',week:'Exam Focus'}
];

// ============================================================
// DATA: Study Guide Content
// ============================================================
const GUIDE = {
tdd: `
<h2>Test-Driven Development (TDD)</h2>
<h3>The Problem TDD Solves</h3>
<p>As software grows, <strong>accidental difficulty</strong> increases: code quality declines, making development speed unpredictable. TDD addresses this by writing tests <em>before</em> production code, ensuring continuous design feedback.</p>

<div class="exam-callout">TDD is NOT about testing — it's a <strong>design technique</strong> that uses tests to drive the design of your code.</div>

<h3>The Red-Green-Refactor Cycle</h3>
<ol>
<li><strong style="color:var(--red)">Red</strong> — Write a failing test that describes the desired behavior</li>
<li><strong style="color:var(--green)">Green</strong> — Write the <em>minimal</em> code to make the test pass</li>
<li><strong style="color:var(--accent)">Refactor</strong> — Clean up the code while keeping tests passing</li>
</ol>

<pre class="code-block"><span class="cm">// RED: Write test first</span>
<span class="fn">it</span>(<span class="str">'adds two numbers'</span>, () => {
  <span class="fn">expect</span>(<span class="fn">add</span>(<span class="num">2</span>, <span class="num">3</span>)).<span class="fn">toEqual</span>(<span class="num">5</span>);
});

<span class="cm">// GREEN: Minimal implementation</span>
<span class="kw">function</span> <span class="fn">add</span>(a, b) {
  <span class="kw">return</span> a + b;
}

<span class="cm">// REFACTOR: Clean up if needed</span></pre>

<h3>Assertions vs Expectations</h3>
<table class="compare-table">
<tr><th>Assertions (assert)</th><th>Expectations (Jest)</th></tr>
<tr><td><code class="inline">assert.equal(sum, 42)</code></td><td><code class="inline">expect(sum).toEqual(42)</code></td></tr>
<tr><td>Classic xUnit style</td><td>BDD-style chaining with matchers</td></tr>
</table>

<h3>Types of Tests</h3>
<table class="compare-table">
<tr><th>Type</th><th>Scope</th><th>Speed</th><th>Tools</th></tr>
<tr><td>Unit Test</td><td>Single function/class/component</td><td>Fast (ms)</td><td>Jest, RTL</td></tr>
<tr><td>End-to-End Test</td><td>Full app in real browser</td><td>Slow (seconds)</td><td>Cypress</td></tr>
</table>

<h3>Stubs vs Mocks</h3>
<table class="compare-table">
<tr><th>Stubs</th><th>Mocks</th></tr>
<tr><td>Return hard-coded data</td><td>Track whether/how functions were called</td></tr>
<tr><td>Replace real dependencies with predetermined responses</td><td>Allow assertions about calls via <code class="inline">.mock.calls</code> and <code class="inline">.mock.results</code></td></tr>
<tr><td>Used for isolating the unit under test</td><td>Used for verifying interactions between units</td></tr>
</table>

<div class="exam-callout">A <strong>stub</strong> returns canned data. A <strong>mock</strong> also lets you assert on how it was called: <code class="inline">expect(mockFn).toHaveBeenCalledWith(args)</code>.</div>

<h3>Advantages of TDD</h3>
<ul>
<li><strong>Regression safety</strong> — existing tests catch new bugs</li>
<li><strong>Robust tests</strong> — tests are written for a purpose, not as an afterthought</li>
<li><strong>Speed of development</strong> — less time debugging, more confidence in changes</li>
<li><strong>Guides toward simplest implementation</strong> and simplest interface</li>
</ul>

<h3>When NOT to TDD</h3>
<ul>
<li>Throwaway/prototype code (spikes)</li>
<li>Rapidly-changing organizations where requirements are chaotic</li>
<li>Systems that will never change after deployment</li>
</ul>
`,

'outside-in': `
<h2>Outside-In TDD</h2>

<h3>Two Approaches to TDD</h3>
<table class="compare-table">
<tr><th>Middle-Out (Classicist)</th><th>Outside-In</th></tr>
<tr><td>Start from core domain logic</td><td>Start from user-facing features</td></tr>
<tr><td>Build outward with real dependencies</td><td>Two-level loop: E2E outer + Unit inner</td></tr>
<tr><td>Test with real collaborators</td><td>Use test doubles for unwritten code</td></tr>
</table>

<h3>The Two-Level TDD Loop</h3>
<pre class="code-block"><span class="cm">// OUTER LOOP: E2E test (Cypress)</span>
<span class="fn">it</span>(<span class="str">'displays restaurants from the API'</span>, () => {
  <span class="cm">// Stub the API response</span>
  cy.<span class="fn">intercept</span>(<span class="str">'GET'</span>, <span class="str">'https://api.example.com/restaurants'</span>, {
    body: [{ id: <span class="num">1</span>, name: <span class="str">'Pizza Place'</span> }]
  });
  cy.<span class="fn">visit</span>(<span class="str">'/'</span>);
  cy.<span class="fn">contains</span>(<span class="str">'Pizza Place'</span>);
});

<span class="cm">// INNER LOOP: Unit test (Jest)</span>
<span class="fn">it</span>(<span class="str">'displays the restaurant name'</span>, () => {
  <span class="fn">render</span>(&lt;<span class="tag">RestaurantList</span>
    <span class="attr">restaurants</span>={[{ name: <span class="str">'Pizza Place'</span> }]}
  /&gt;);
  <span class="fn">expect</span>(screen.<span class="fn">getByText</span>(<span class="str">'Pizza Place'</span>))
    .<span class="fn">toBeInTheDocument</span>();
});</pre>

<div class="exam-callout">Outside-In TDD mantra: <strong>"Write the code you wish you had."</strong> Use test doubles for collaborators that don't exist yet.</div>

<h3>The Outside-In Process</h3>
<ol>
<li>Select a user story</li>
<li>Write an E2E test (Cypress) — it fails (Red)</li>
<li>Step down to unit tests (Jest/RTL)</li>
<li>Write unit test for a component — it fails (Red)</li>
<li>Write minimal code to pass the unit test (Green)</li>
<li>Refactor</li>
<li>Repeat inner loop until E2E test passes</li>
<li>Step back up — E2E test should now be Green</li>
</ol>

<h3>Key Cypress Patterns (E2E)</h3>
<pre class="code-block"><span class="cm">// Stub API calls to isolate frontend</span>
cy.<span class="fn">intercept</span>(<span class="str">'GET'</span>, <span class="str">'/api/restaurants'</span>, {
  body: [{ id: <span class="num">1</span>, name: <span class="str">'Sushi Spot'</span> }]
}).<span class="fn">as</span>(<span class="str">'getRestaurants'</span>);

cy.<span class="fn">visit</span>(<span class="str">'/'</span>);
cy.<span class="fn">wait</span>(<span class="str">'@getRestaurants'</span>);
cy.<span class="fn">contains</span>(<span class="str">'Sushi Spot'</span>).<span class="fn">should</span>(<span class="str">'be.visible'</span>);</pre>

<h3>Key Jest/RTL Patterns (Unit)</h3>
<pre class="code-block"><span class="cm">// Common test helper pattern</span>
<span class="kw">let</span> loadRestaurants;

<span class="kw">function</span> <span class="fn">renderComponent</span>(props = {}) {
  loadRestaurants = jest.<span class="fn">fn</span>();
  <span class="kw">return</span> <span class="fn">render</span>(
    &lt;<span class="tag">RestaurantList</span>
      <span class="attr">loadRestaurants</span>={loadRestaurants}
      <span class="attr">restaurants</span>={[]}
      {...props}
    /&gt;
  );
}

<span class="fn">it</span>(<span class="str">'calls loadRestaurants on first render'</span>, () => {
  <span class="fn">renderComponent</span>();
  <span class="fn">expect</span>(loadRestaurants).<span class="fn">toHaveBeenCalled</span>();
});</pre>

<h3>Connecting to the API</h3>
<pre class="code-block"><span class="cm">// src/api.js — creating an Axios client</span>

<span class="kw">export default</span> api;</pre>

testing: `
<h2>Testing Deep Dive — Jest, RTL & Cypress</h2>

<h3>React Testing Library (RTL) Query Priority</h3>
<p>Always prefer queries that reflect how users interact with the app:</p>
<ol>
<li><code class="inline">getByRole</code> — accessible role (button, textbox, heading)</li>
<li><code class="inline">getByLabelText</code> — form labels</li>
<li><code class="inline">getByText</code> — visible text</li>
<li><code class="inline">getByTestId</code> — last resort (data-testid attribute)</li>
</ol>

<h3>getBy vs queryBy vs findBy</h3>
<table class="compare-table">
<tr><th>Method</th><th>No Match</th><th>1 Match</th><th>1+ Match</th><th>Async?</th></tr>
<tr><td><code class="inline">getBy</code></td><td>Throws error</td><td>Returns element</td><td>Throws error</td><td>No</td></tr>
<tr><td><code class="inline">queryBy</code></td><td>Returns null</td><td>Returns element</td><td>Throws error</td><td>No</td></tr>
<tr><td><code class="inline">findBy</code></td><td>Throws error</td><td>Returns element</td><td>Throws error</td><td>Yes (Promise)</td></tr>
</table>

<div class="exam-callout">Use <code class="inline">queryBy</code> to assert something does NOT exist: <code class="inline">expect(screen.queryByText('Error')).not.toBeInTheDocument()</code>. Use <code class="inline">findBy</code> for elements that appear after async operations.</div>

<h3>Common Jest/RTL Assertions</h3>
<pre class="code-block"><span class="cm">// DOM assertions (from @testing-library/jest-dom)</span>
<span class="fn">expect</span>(element).<span class="fn">toBeInTheDocument</span>();
<span class="fn">expect</span>(element).<span class="fn">toBeVisible</span>();
<span class="fn">expect</span>(element).<span class="fn">toHaveValue</span>(<span class="str">'text'</span>);
<span class="fn">expect</span>(element).<span class="fn">toHaveTextContent</span>(<span class="str">'hello'</span>);
<span class="fn">expect</span>(element).<span class="fn">toBeDisabled</span>();
<span class="fn">expect</span>(element).<span class="fn">toHaveClass</span>(<span class="str">'active'</span>);</pre>

<h3>fireEvent Methods</h3>
<pre class="code-block"><span class="cm">// User interaction simulation</span>
fireEvent.<span class="fn">click</span>(button);
fireEvent.<span class="fn">change</span>(input, { target: { value: <span class="str">'new text'</span> } });
fireEvent.<span class="fn">submit</span>(form);
fireEvent.<span class="fn">keyDown</span>(input, { key: <span class="str">'Enter'</span> });
fireEvent.<span class="fn">focus</span>(input);
fireEvent.<span class="fn">blur</span>(input);</pre>

<h3>Mock Functions (jest.fn)</h3>
<pre class="code-block"><span class="kw">const</span> mockFn = jest.<span class="fn">fn</span>();

<span class="cm">// Return value</span>
mockFn.<span class="fn">mockReturnValue</span>(<span class="num">42</span>);
mockFn.<span class="fn">mockReturnValueOnce</span>(<span class="str">'first call'</span>);

<span class="cm">// Assertions</span>
<span class="fn">expect</span>(mockFn).<span class="fn">toHaveBeenCalled</span>();
<span class="fn">expect</span>(mockFn).<span class="fn">toHaveBeenCalledTimes</span>(<span class="num">2</span>);
<span class="fn">expect</span>(mockFn).<span class="fn">toHaveBeenCalledWith</span>(<span class="str">'arg1'</span>, <span class="str">'arg2'</span>);

<span class="cm">// Inspect calls</span>
mockFn.mock.calls     <span class="cm">// [[arg1, arg2], [arg1]]</span>
mockFn.mock.results   <span class="cm">// [{ type: 'return', value: 42 }]</span></pre>

<div class="exam-callout"><code class="inline">jest.fn()</code> creates a mock function. <code class="inline">.mock.calls</code> is an array of arrays — each inner array contains the arguments of that call. <code class="inline">.mock.calls[0][0]</code> = first argument of first call.</div>

<h3>Cypress Commands</h3>
<pre class="code-block"><span class="cm">// Navigation & Selection</span>
cy.<span class="fn">visit</span>(<span class="str">'/'</span>);
cy.<span class="fn">contains</span>(<span class="str">'selector'</span>, <span class="str">'text'</span>);
cy.<span class="fn">get</span>(<span class="str">'ul'</span>);
cy.<span class="fn">get</span>(<span class="str">'[data-testid="item"]'</span>);

<span class="cm">// Actions</span>
cy.<span class="fn">get</span>(<span class="str">'button'</span>).<span class="fn">click</span>();
cy.<span class="fn">get</span>(<span class="str">'input'</span>).<span class="fn">type</span>(<span class="str">'hello'</span>);
cy.<span class="fn">get</span>(<span class="str">'input'</span>).<span class="fn">clear</span>();

<span class="cm">// Assertions</span>
cy.<span class="fn">get</span>(<span class="str">'ul'</span>).<span class="fn">should</span>(<span class="str">'exist'</span>);
cy.<span class="fn">get</span>(<span class="str">'ul'</span>).<span class="fn">should</span>(<span class="str">'not.exist'</span>);        <span class="cm">// removed from DOM</span>
cy.<span class="fn">get</span>(<span class="str">'.item'</span>).<span class="fn">should</span>(<span class="str">'be.visible'</span>);
cy.<span class="fn">get</span>(<span class="str">'.item'</span>).<span class="fn">should</span>(<span class="str">'not.be.visible'</span>);  <span class="cm">// in DOM but hidden</span>
cy.<span class="fn">get</span>(<span class="str">'input'</span>).<span class="fn">should</span>(<span class="str">'have.value'</span>, <span class="str">'hello'</span>);
cy.<span class="fn">get</span>(<span class="str">'div'</span>).<span class="fn">should</span>(<span class="str">'contain'</span>, <span class="str">'text'</span>);</pre>

<div class="exam-callout"><code class="inline">not.exist</code> = element is completely removed from the DOM. <code class="inline">not.be.visible</code> = element is in the DOM but hidden (e.g., display:none). These are different!</div>

<h3>Cypress vs Jest Comparison</h3>
<table class="compare-table">
<tr><th>Feature</th><th>Jest + RTL</th><th>Cypress</th></tr>
<tr><td>Scope</td><td>Single component</td><td>Entire application</td></tr>
<tr><td>Speed</td><td>Fast (milliseconds)</td><td>Slow (seconds)</td></tr>
<tr><td>Browser</td><td>Simulated (jsdom)</td><td>Real browser</td></tr>
<tr><td>API Mocking</td><td><code class="inline">jest.fn()</code></td><td><code class="inline">cy.intercept()</code></td></tr>
<tr><td>Best For</td><td>Edge cases, logic</td><td>User flows, integration</td></tr>
</table>

<h3>Testing Principle: Arrange → Act → Assert</h3>
<pre class="code-block"><span class="fn">it</span>(<span class="str">'increments counter on click'</span>, () => {
  <span class="cm">// Arrange</span>
  <span class="fn">render</span>(&lt;<span class="tag">Counter</span> /&gt;);

  <span class="cm">// Act</span>
  fireEvent.<span class="fn">click</span>(screen.<span class="fn">getByText</span>(<span class="str">'+'</span>));

  <span class="cm">// Assert</span>
  <span class="fn">expect</span>(screen.<span class="fn">getByText</span>(<span class="str">'1'</span>)).<span class="fn">toBeInTheDocument</span>();
});</pre>
`,

redux: `
<h2>Redux</h2>

<h3>What is Redux?</h3>
<p>A <strong>centralized store</strong> for application state with predictable update rules. Use it for large state shared across many components, complex update logic, or large codebases.</p>

<h3>Core Concepts</h3>
<table class="compare-table">
<tr><th>Concept</th><th>Description</th></tr>
<tr><td>Store</td><td>Single object holding all app state; created by passing a reducer</td></tr>
<tr><td>Action</td><td>Plain JS object with <code class="inline">type</code> field and optional <code class="inline">payload</code></td></tr>
<tr><td>Action Creator</td><td>Function that returns an action object</td></tr>
<tr><td>Reducer</td><td>Pure function: <code class="inline">(state, action) => newState</code></td></tr>
<tr><td>Dispatch</td><td><code class="inline">store.dispatch(action)</code> — only way to update state</td></tr>
<tr><td>Selector</td><td>Function to extract specific data from the store</td></tr>
</table>

<div class="exam-callout">Reducers must be <strong>pure functions</strong>: no side effects, no async, no mutations. They always return a <em>new</em> state object using the spread operator.</div>

<h3>Redux Data Flow</h3>
<pre class="code-block"><span class="cm">// 1. Action creator</span>
<span class="kw">const</span> <span class="fn">addTodo</span> = (text) => ({
  type: <span class="str">'todos/add'</span>,
  payload: text,
});

<span class="cm">// 2. Reducer (pure function)</span>
<span class="kw">function</span> <span class="fn">todosReducer</span>(state = [], action) {
  <span class="kw">switch</span> (action.type) {
    <span class="kw">case</span> <span class="str">'todos/add'</span>:
      <span class="kw">return</span> [...state, { text: action.payload, done: <span class="num">false</span> }];
    <span class="kw">default</span>:
      <span class="kw">return</span> state;
  }
}

<span class="cm">// 3. Create store</span>
<span class="kw">import</span> { createStore } <span class="kw">from</span> <span class="str">'redux'</span>;
<span class="kw">const</span> store = <span class="fn">createStore</span>(todosReducer);

<span class="cm">// 4. Dispatch action</span>
store.<span class="fn">dispatch</span>(<span class="fn">addTodo</span>(<span class="str">'Learn Redux'</span>));

<span class="cm">// 5. Read state</span>
store.<span class="fn">getState</span>(); <span class="cm">// [{ text: 'Learn Redux', done: false }]</span></pre>

<h3>Immutability with Spread Operator</h3>
<pre class="code-block"><span class="cm">// WRONG — mutates state</span>
state.push(newItem);      <span class="cm">// ❌</span>
state.name = <span class="str">'new'</span>;       <span class="cm">// ❌</span>

<span class="cm">// RIGHT — creates new objects</span>
<span class="kw">return</span> [...state, newItem];           <span class="cm">// ✓ array</span>
<span class="kw">return</span> { ...state, name: <span class="str">'new'</span> };     <span class="cm">// ✓ object</span>
<span class="kw">return</span> state.<span class="fn">filter</span>(i => i.id !== id); <span class="cm">// ✓ remove</span>
<span class="kw">return</span> state.<span class="fn">map</span>(i =>               <span class="cm">// ✓ update one</span>
  i.id === id ? { ...i, done: <span class="num">true</span> } : i
);</pre>

<h3>Connecting React to Redux</h3>
<pre class="code-block"><span class="cm">// Wrap app with Provider</span>
<span class="kw">import</span> { Provider } <span class="kw">from</span> <span class="str">'react-redux'</span>;
&lt;<span class="tag">Provider</span> <span class="attr">store</span>={store}&gt;
  &lt;<span class="tag">App</span> /&gt;
&lt;/<span class="tag">Provider</span>&gt;

<span class="cm">// Connect a component</span>
<span class="kw">import</span> { connect } <span class="kw">from</span> <span class="str">'react-redux'</span>;

<span class="kw">const</span> <span class="fn">mapStateToProps</span> = (state) => ({
  restaurants: state.restaurants.records,
});

<span class="kw">const</span> <span class="fn">mapDispatchToProps</span> = {
  loadRestaurants,  <span class="cm">// auto-wrapped in dispatch()</span>
};

<span class="kw">export default</span> <span class="fn">connect</span>(mapStateToProps, mapDispatchToProps)(RestaurantList);</pre>

<div class="exam-callout"><strong>Named vs Default exports for testing:</strong> Export the <em>unconnected</em> component as a named export for unit tests (no Redux store needed). Export the <em>connected</em> version as default for the app.</div>

<h3>Redux Thunk — Async Actions</h3>
<pre class="code-block"><span class="cm">// Thunk = action creator that returns a FUNCTION instead of an object</span>
<span class="kw">const</span> <span class="fn">loadRestaurants</span> = () =>
  <span class="kw">async</span> (dispatch, getState, api) => {
    <span class="kw">const</span> records = <span class="kw">await</span> api.<span class="fn">loadRestaurants</span>();
    dispatch(<span class="fn">storeRestaurants</span>(records));
  };

<span class="cm">// Configure thunk middleware with dependency injection</span>
<span class="kw">import</span> thunk <span class="kw">from</span> <span class="str">'redux-thunk'</span>;
<span class="kw">const</span> store = <span class="fn">createStore</span>(
  rootReducer,
  <span class="fn">applyMiddleware</span>(thunk.<span class="fn">withExtraArgument</span>(api))
);</pre>

<div class="exam-callout"><strong>Thunk</strong> receives <code class="inline">(dispatch, getState, extraArg)</code>. The <code class="inline">extraArg</code> is the API object injected via <code class="inline">thunk.withExtraArgument(api)</code> — this enables dependency injection for testing.</div>

<h3>Testing Redux (Thunk + Reducer Together)</h3>
<pre class="code-block"><span class="fn">it</span>(<span class="str">'loads restaurants from API'</span>, <span class="kw">async</span> () => {
  <span class="kw">const</span> records = [{ name: <span class="str">'Sushi'</span> }];
  <span class="kw">const</span> api = {
    loadRestaurants: () => Promise.<span class="fn">resolve</span>(records),
  };
  <span class="kw">const</span> store = <span class="fn">createStore</span>(
    rootReducer,
    <span class="fn">applyMiddleware</span>(thunk.<span class="fn">withExtraArgument</span>(api))
  );

  <span class="kw">await</span> store.<span class="fn">dispatch</span>(<span class="fn">loadRestaurants</span>());
  <span class="fn">expect</span>(store.<span class="fn">getState</span>().restaurants.records)
    .<span class="fn">toEqual</span>(records);
});</pre>

<h3>Prop Drilling Problem</h3>
<p>Without Redux (or Context), state must be passed through intermediate components that don't use it. Redux solves this by letting any component <code class="inline">connect()</code> directly to the store.</p>
`,

context: `
<h2>React Context API</h2>

<h3>The Problem: Prop Drilling</h3>
<p>Passing data through components that don't need it. Context provides a way to share values between components without explicitly passing props at every level.</p>

<h3>Three Steps to Use Context</h3>
<ol>
<li><strong>Create</strong> — <code class="inline">const MyContext = createContext()</code></li>
<li><strong>Provide</strong> — Wrap children with <code class="inline">&lt;MyContext.Provider value={...}&gt;</code></li>
<li><strong>Consume</strong> — <code class="inline">const value = useContext(MyContext)</code></li>
</ol>

<pre class="code-block"><span class="cm">// Step 1: Create context</span>
<span class="kw">import</span> { createContext, useState, useContext } <span class="kw">from</span> <span class="str">'react'</span>;
<span class="kw">const</span> RestaurantContext = <span class="fn">createContext</span>();

<span class="cm">// Step 2: Create Provider component</span>
<span class="kw">export function</span> <span class="fn">RestaurantProvider</span>({ children }) {
  <span class="kw">const</span> [restaurants, setRestaurants] = <span class="fn">useState</span>([]);

  <span class="kw">const</span> <span class="fn">loadRestaurants</span> = <span class="kw">async</span> () => {
    <span class="kw">const</span> data = <span class="kw">await</span> api.<span class="fn">loadRestaurants</span>();
    <span class="fn">setRestaurants</span>(data);
  };

  <span class="kw">const</span> contextValue = { restaurants, loadRestaurants };

  <span class="kw">return</span> (
    &lt;<span class="tag">RestaurantContext.Provider</span> <span class="attr">value</span>={contextValue}&gt;
      {children}
    &lt;/<span class="tag">RestaurantContext.Provider</span>&gt;
  );
}

<span class="cm">// Step 3: Consume in any child component</span>
<span class="kw">function</span> <span class="fn">RestaurantList</span>() {
  <span class="kw">const</span> { restaurants, loadRestaurants } = <span class="fn">useContext</span>(RestaurantContext);
  <span class="cm">// ...</span>
}</pre>

<div class="exam-callout">The <code class="inline">children</code> prop is whatever JSX is wrapped inside the Provider: <code class="inline">&lt;Provider&gt;{children}&lt;/Provider&gt;</code>. Only components <em>inside</em> the Provider can access context.</div>

<h3>Testing Components with Context</h3>
<pre class="code-block"><span class="cm">// Helper function pattern for testing</span>
<span class="kw">function</span> <span class="fn">renderWithContext</span>(overrides = {}) {
  <span class="kw">const</span> defaultValue = {
    restaurants: [],
    loadRestaurants: jest.<span class="fn">fn</span>(),
    loading: <span class="num">false</span>,
    error: <span class="num">null</span>,
    ...overrides,
  };

  <span class="kw">return</span> <span class="fn">render</span>(
    &lt;<span class="tag">RestaurantContext.Provider</span> <span class="attr">value</span>={defaultValue}&gt;
      &lt;<span class="tag">RestaurantList</span> /&gt;
    &lt;/<span class="tag">RestaurantContext.Provider</span>&gt;
  );
}

<span class="cm">// Test each state:</span>
<span class="fn">it</span>(<span class="str">'shows loading state'</span>, () => {
  <span class="fn">renderWithContext</span>({ loading: <span class="num">true</span> });
  <span class="fn">expect</span>(screen.<span class="fn">getByText</span>(<span class="str">'Loading...'</span>)).<span class="fn">toBeInTheDocument</span>();
});

<span class="fn">it</span>(<span class="str">'shows error state'</span>, () => {
  <span class="fn">renderWithContext</span>({ error: <span class="str">'Failed'</span> });
  <span class="fn">expect</span>(screen.<span class="fn">getByText</span>(<span class="str">'Failed'</span>)).<span class="fn">toBeInTheDocument</span>();
});</pre>

<h3>Context vs Redux</h3>
<table class="compare-table">
<tr><th>Feature</th><th>Context API</th><th>Redux</th></tr>
<tr><td>Built-in</td><td>Yes (React core)</td><td>No (separate library)</td></tr>
<tr><td>Setup</td><td>Minimal</td><td>More boilerplate</td></tr>
<tr><td>DevTools</td><td>No</td><td>Yes (Redux DevTools)</td></tr>
<tr><td>Middleware</td><td>No</td><td>Yes (thunks, etc.)</td></tr>
<tr><td>Best for</td><td>Small-medium apps</td><td>Large, complex state</td></tr>
</table>

<h3>Multiple Contexts</h3>
<pre class="code-block"><span class="cm">// Nest providers in App.js</span>
<span class="kw">function</span> <span class="fn">App</span>() {
  <span class="kw">return</span> (
    &lt;<span class="tag">AuthProvider</span>&gt;
      &lt;<span class="tag">ThemeProvider</span>&gt;
        &lt;<span class="tag">RestaurantProvider</span>&gt;
          &lt;<span class="tag">MainContent</span> /&gt;
        &lt;/<span class="tag">RestaurantProvider</span>&gt;
      &lt;/<span class="tag">ThemeProvider</span>&gt;
    &lt;/<span class="tag">AuthProvider</span>&gt;
  );
}</pre>
`,

reducer: `
<h2>useReducer & Firebase Authentication</h2>

<h3>useReducer Hook</h3>
<p>When <code class="inline">useState</code> becomes unwieldy with multiple state variables, <code class="inline">useReducer</code> provides a Redux-like pattern within a component or Context.</p>

<pre class="code-block"><span class="cm">// 1. Define initial state and reducer</span>
<span class="kw">const</span> initialState = {
  restaurants: [],
  loading: <span class="num">false</span>,
  error: <span class="num">null</span>,
};

<span class="kw">function</span> <span class="fn">restaurantReducer</span>(state, action) {
  <span class="kw">switch</span> (action.type) {
    <span class="kw">case</span> <span class="str">'LOAD_START'</span>:
      <span class="kw">return</span> { ...state, loading: <span class="num">true</span>, error: <span class="num">null</span> };
    <span class="kw">case</span> <span class="str">'LOAD_SUCCESS'</span>:
      <span class="kw">return</span> { ...state, loading: <span class="num">false</span>, restaurants: action.payload };
    <span class="kw">case</span> <span class="str">'LOAD_ERROR'</span>:
      <span class="kw">return</span> { ...state, loading: <span class="num">false</span>, error: action.payload };
    <span class="kw">case</span> <span class="str">'ADD_RESTAURANT'</span>:
      <span class="kw">return</span> { ...state,
        restaurants: [...state.restaurants, action.payload] };
    <span class="kw">case</span> <span class="str">'CLEAR_ERROR'</span>:
      <span class="kw">return</span> { ...state, error: <span class="num">null</span> };
    <span class="kw">default</span>:
      <span class="kw">return</span> state;
  }
}

<span class="cm">// 2. Use in Provider</span>
<span class="kw">function</span> <span class="fn">RestaurantProvider</span>({ children }) {
  <span class="kw">const</span> [state, dispatch] = <span class="fn">useReducer</span>(restaurantReducer, initialState);

  <span class="kw">const</span> <span class="fn">loadRestaurants</span> = <span class="kw">async</span> () => {
    <span class="fn">dispatch</span>({ type: <span class="str">'LOAD_START'</span> });
    <span class="kw">try</span> {
      <span class="kw">const</span> data = <span class="kw">await</span> api.<span class="fn">loadRestaurants</span>();
      <span class="fn">dispatch</span>({ type: <span class="str">'LOAD_SUCCESS'</span>, payload: data });
    } <span class="kw">catch</span> (e) {
      <span class="fn">dispatch</span>({ type: <span class="str">'LOAD_ERROR'</span>, payload: e.message });
    }
  };

  <span class="kw">return</span> (
    &lt;<span class="tag">RestaurantContext.Provider</span> <span class="attr">value</span>={{ ...state, loadRestaurants }}&gt;
      {children}
    &lt;/<span class="tag">RestaurantContext.Provider</span>&gt;
  );
}</pre>

<div class="exam-callout"><code class="inline">useReducer</code> returns <code class="inline">[state, dispatch]</code> — same pattern as Redux but local to the component. Dispatch takes action objects with <code class="inline">type</code> and optional <code class="inline">payload</code>.</div>

<h3>Testing Reducers</h3>
<pre class="code-block"><span class="cm">// Reducers are pure functions — easy to test!</span>
<span class="fn">it</span>(<span class="str">'handles LOAD_SUCCESS'</span>, () => {
  <span class="kw">const</span> prevState = { restaurants: [], loading: <span class="num">true</span>, error: <span class="num">null</span> };
  <span class="kw">const</span> action = {
    type: <span class="str">'LOAD_SUCCESS'</span>,
    payload: [{ name: <span class="str">'Pizza'</span> }],
  };
  <span class="kw">const</span> newState = <span class="fn">restaurantReducer</span>(prevState, action);
  <span class="fn">expect</span>(newState.loading).<span class="fn">toBe</span>(<span class="num">false</span>);
  <span class="fn">expect</span>(newState.restaurants).<span class="fn">toEqual</span>([{ name: <span class="str">'Pizza'</span> }]);
});</pre>

<h3>useReducer + Context vs Redux</h3>
<table class="compare-table">
<tr><th>Feature</th><th>useReducer + Context</th><th>Redux</th></tr>
<tr><td>Built-in</td><td>Yes</td><td>No (library)</td></tr>
<tr><td>Boilerplate</td><td>Less</td><td>More</td></tr>
<tr><td>DevTools</td><td>No</td><td>Yes</td></tr>
<tr><td>Middleware</td><td>No</td><td>Yes</td></tr>
<tr><td>Pattern</td><td>Same (actions, dispatch, reducer)</td><td>Same</td></tr>
</table>

<h3>Firebase Authentication</h3>

<h3>Architecture</h3>
<p><strong>React Client</strong> ↔ <strong>Firebase Auth</strong> ↔ <strong>Express Server</strong></p>

<h3>ID Token (JWT)</h3>
<ul>
<li>Contains user info, cryptographically signed by Firebase</li>
<li>Expires after <strong>1 hour</strong> — auto-refreshed via refresh token</li>
<li><code class="inline">getIdToken()</code> always returns a valid token</li>
</ul>

<h3>Auth Flow</h3>
<ol>
<li>User signs in via Firebase client SDK</li>
<li>Firebase returns an ID token (JWT)</li>
<li>Client sends token in <code class="inline">Authorization: Bearer &lt;token&gt;</code> header</li>
<li>Server verifies token with <code class="inline">admin.auth().verifyIdToken(token)</code></li>
<li>If valid, server processes the request</li>
</ol>

<pre class="code-block"><span class="cm">// Server middleware: checkAuth</span>
<span class="kw">const</span> <span class="fn">checkAuth</span> = <span class="kw">async</span> (req, res, next) => {
  <span class="kw">const</span> authHeader = req.headers.authorization;
  <span class="kw">if</span> (!authHeader || !authHeader.<span class="fn">startsWith</span>(<span class="str">'Bearer '</span>)) {
    <span class="kw">return</span> res.<span class="fn">status</span>(<span class="num">401</span>).<span class="fn">json</span>({ error: <span class="str">'Unauthorized'</span> });
  }
  <span class="kw">const</span> token = authHeader.<span class="fn">split</span>(<span class="str">'Bearer '</span>)[<span class="num">1</span>];
  <span class="kw">try</span> {
    <span class="kw">const</span> decoded = <span class="kw">await</span> admin.<span class="fn">auth</span>().<span class="fn">verifyIdToken</span>(token);
    req.user = decoded;
    <span class="fn">next</span>();
  } <span class="kw">catch</span> (error) {
    res.<span class="fn">status</span>(<span class="num">401</span>).<span class="fn">json</span>({ error: <span class="str">'Invalid token'</span> });
  }
};</pre>

<div class="exam-callout">Client uses <code class="inline">firebase</code> package. Server uses <code class="inline">firebase-admin</code>. The service account key must <strong>never</strong> be committed to git. Token in header format: <code class="inline">Authorization: Bearer &lt;token&gt;</code></div>

<h3>Firebase Context Pattern</h3>
<pre class="code-block"><span class="cm">// AuthContext with login, logout, user state</span>
<span class="kw">const</span> AuthContext = <span class="fn">createContext</span>();

<span class="kw">function</span> <span class="fn">AuthProvider</span>({ children }) {
  <span class="kw">const</span> [user, setUser] = <span class="fn">useState</span>(<span class="num">null</span>);
  <span class="kw">const</span> [token, setToken] = <span class="fn">useState</span>(<span class="num">null</span>);

  <span class="kw">const</span> <span class="fn">login</span> = <span class="kw">async</span> (email, password) => {
    <span class="kw">const</span> cred = <span class="kw">await</span> firebase.<span class="fn">auth</span>()
      .<span class="fn">signInWithEmailAndPassword</span>(email, password);
    <span class="fn">setUser</span>(cred.user);
    <span class="kw">const</span> t = <span class="kw">await</span> cred.user.<span class="fn">getIdToken</span>();
    <span class="fn">setToken</span>(t);
  };

  <span class="kw">const</span> <span class="fn">logout</span> = () => firebase.<span class="fn">auth</span>().<span class="fn">signOut</span>();
  <span class="kw">const</span> isLoggedIn = !!user;

  <span class="kw">return</span> (
    &lt;<span class="tag">AuthContext.Provider</span> <span class="attr">value</span>={{ user, token, login, logout, isLoggedIn }}&gt;
      {children}
    &lt;/<span class="tag">AuthContext.Provider</span>&gt;
  );
}</pre>
`,

memo: `
<h2>Memoization in React</h2>
<p>React re-renders components whenever state or props change. Memoization helps skip unnecessary re-renders and recalculations.</p>

<h3>The Three Memoization Tools</h3>
<table class="compare-table">
<tr><th>Tool</th><th>Memoizes</th><th>Use Case</th></tr>
<tr><td><code class="inline">useMemo</code></td><td>Computed values</td><td>Expensive calculations, object references</td></tr>
<tr><td><code class="inline">useCallback</code></td><td>Functions</td><td>Functions passed as props, in useEffect deps</td></tr>
<tr><td><code class="inline">React.memo</code></td><td>Components</td><td>Skip re-render if props unchanged</td></tr>
</table>

<h3>useMemo — Memoize Values</h3>
<pre class="code-block"><span class="cm">// Only recalculates when 'data' changes</span>
<span class="kw">const</span> filteredList = <span class="fn">useMemo</span>(() => {
  <span class="kw">return</span> restaurants.<span class="fn">filter</span>(r =>
    r.name.<span class="fn">toLowerCase</span>().<span class="fn">includes</span>(searchTerm.<span class="fn">toLowerCase</span>())
  );
}, [restaurants, searchTerm]);

<span class="cm">// Without useMemo: filters on EVERY render</span>
<span class="cm">// With useMemo: only re-filters when restaurants or searchTerm change</span></pre>

<h3>useCallback — Memoize Functions</h3>
<pre class="code-block"><span class="cm">// Returns the same function reference across renders</span>
<span class="kw">const</span> loadRestaurants = <span class="fn">useCallback</span>(<span class="kw">async</span> () => {
  <span class="fn">dispatch</span>({ type: <span class="str">'LOAD_START'</span> });
  <span class="kw">const</span> data = <span class="kw">await</span> api.<span class="fn">loadRestaurants</span>();
  <span class="fn">dispatch</span>({ type: <span class="str">'LOAD_SUCCESS'</span>, payload: data });
}, [dispatch]);

<span class="cm">// Without useCallback: new function reference every render</span>
<span class="cm">// → child components re-render, useEffect re-triggers</span></pre>

<div class="exam-callout"><code class="inline">useCallback(fn, deps)</code> is equivalent to <code class="inline">useMemo(() => fn, deps)</code>. Both return cached values; <code class="inline">useCallback</code> is specifically for functions.</div>

<h3>React.memo — Memoize Components</h3>
<pre class="code-block"><span class="cm">// Skips re-render if props haven't changed (shallow compare)</span>
<span class="kw">const</span> RestaurantCard = <span class="fn">React.memo</span>(({ restaurant }) => {
  <span class="kw">return</span> (
    &lt;<span class="tag">div</span>&gt;
      &lt;<span class="tag">h3</span>&gt;{restaurant.name}&lt;/<span class="tag">h3</span>&gt;
      &lt;<span class="tag">p</span>&gt;{restaurant.address}&lt;/<span class="tag">p</span>&gt;
    &lt;/<span class="tag">div</span>&gt;
  );
});

<span class="cm">// Custom comparison function</span>
<span class="kw">const</span> MemoComponent = <span class="fn">React.memo</span>(Component, (prevProps, nextProps) => {
  <span class="kw">return</span> prevProps.id === nextProps.id; <span class="cm">// true = skip re-render</span>
});</pre>

<h3>Combining All Three in Context</h3>
<pre class="code-block"><span class="kw">function</span> <span class="fn">RestaurantProvider</span>({ children }) {
  <span class="kw">const</span> [state, dispatch] = <span class="fn">useReducer</span>(reducer, initialState);

  <span class="cm">// Memoize function with useCallback</span>
  <span class="kw">const</span> loadRestaurants = <span class="fn">useCallback</span>(<span class="kw">async</span> () => {
    <span class="fn">dispatch</span>({ type: <span class="str">'LOAD_START'</span> });
    <span class="kw">const</span> data = <span class="kw">await</span> api.<span class="fn">loadRestaurants</span>();
    <span class="fn">dispatch</span>({ type: <span class="str">'LOAD_SUCCESS'</span>, payload: data });
  }, []);

  <span class="cm">// Memoize context value object with useMemo</span>
  <span class="kw">const</span> contextValue = <span class="fn">useMemo</span>(() => ({
    ...state,
    loadRestaurants,
  }), [state, loadRestaurants]);

  <span class="kw">return</span> (
    &lt;<span class="tag">RestaurantContext.Provider</span> <span class="attr">value</span>={contextValue}&gt;
      {children}
    &lt;/<span class="tag">RestaurantContext.Provider</span>&gt;
  );
}</pre>

<div class="exam-callout"><strong>Why memoize the context value?</strong> Without <code class="inline">useMemo</code>, a new object is created every render → all consumers re-render. With <code class="inline">useMemo</code>, the object reference stays the same unless state actually changes.</div>

<h3>When NOT to Memoize</h3>
<ul>
<li>Simple calculations (overhead of memoization > computation cost)</li>
<li>Values that change on every render anyway</li>
<li>Premature optimization — measure first, optimize second</li>
</ul>

<h3>Common Mistake: React.memo + New References</h3>
<pre class="code-block"><span class="cm">// ❌ React.memo won't help — new function each render</span>
&lt;<span class="tag">MemoChild</span> <span class="attr">onClick</span>={() => <span class="fn">doSomething</span>()} /&gt;

<span class="cm">// ✓ Pair React.memo with useCallback</span>
<span class="kw">const</span> handleClick = <span class="fn">useCallback</span>(() => <span class="fn">doSomething</span>(), []);
&lt;<span class="tag">MemoChild</span> <span class="attr">onClick</span>={handleClick} /&gt;</pre>
`,

hooks: `
<h2>Custom Hooks & useRef</h2>

<h3>Custom Hooks</h3>
<p>A custom hook is a JavaScript function whose name starts with <code class="inline">use</code> and that calls other hooks. They let you extract and reuse stateful logic.</p>

<h3>Rules of Hooks</h3>
<ol>
<li>Must start with <code class="inline">use</code></li>
<li>Only call hooks at the <strong>top level</strong> (not inside loops, conditions, or nested functions)</li>
<li>Only call from <strong>React function components</strong> or other custom hooks</li>
</ol>

<div class="exam-callout">Custom hooks share <strong>logic</strong>, not <strong>state</strong>. Each component that uses a hook gets its own independent copy of the state.</div>

<h3>Example: useToggle</h3>
<pre class="code-block"><span class="kw">function</span> <span class="fn">useToggle</span>(initialValue = <span class="num">false</span>) {
  <span class="kw">const</span> [value, setValue] = <span class="fn">useState</span>(initialValue);

  <span class="kw">const</span> toggle = () => <span class="fn">setValue</span>(v => !v);
  <span class="kw">const</span> setTrue = () => <span class="fn">setValue</span>(<span class="num">true</span>);
  <span class="kw">const</span> setFalse = () => <span class="fn">setValue</span>(<span class="num">false</span>);

  <span class="kw">return</span> { value, toggle, setTrue, setFalse };
}

<span class="cm">// Usage</span>
<span class="kw">function</span> <span class="fn">RestaurantCard</span>({ restaurant }) {
  <span class="kw">const</span> { value: showDetails, toggle } = <span class="fn">useToggle</span>();
  <span class="kw">return</span> (
    &lt;<span class="tag">div</span>&gt;
      &lt;<span class="tag">h3</span>&gt;{restaurant.name}&lt;/<span class="tag">h3</span>&gt;
      &lt;<span class="tag">button</span> <span class="attr">onClick</span>={toggle}&gt;
        {showDetails ? <span class="str">'Hide'</span> : <span class="str">'Show'</span>} Details
      &lt;/<span class="tag">button</span>&gt;
      {showDetails && &lt;<span class="tag">p</span>&gt;{restaurant.address}&lt;/<span class="tag">p</span>&gt;}
    &lt;/<span class="tag">div</span>&gt;
  );
}</pre>

<h3>Example: useLocalStorage</h3>
<pre class="code-block"><span class="kw">function</span> <span class="fn">useLocalStorage</span>(key, initialValue) {
  <span class="kw">const</span> [value, setValue] = <span class="fn">useState</span>(() => {
    <span class="kw">const</span> stored = localStorage.<span class="fn">getItem</span>(key);
    <span class="kw">return</span> stored ? <span class="fn">JSON.parse</span>(stored) : initialValue;
  });

  <span class="fn">useEffect</span>(() => {
    localStorage.<span class="fn">setItem</span>(key, <span class="fn">JSON.stringify</span>(value));
  }, [key, value]);

  <span class="kw">return</span> [value, setValue];
}</pre>

<h3>Example: useRestaurants (Context Wrapper)</h3>
<pre class="code-block"><span class="kw">function</span> <span class="fn">useRestaurants</span>() {
  <span class="kw">const</span> context = <span class="fn">useContext</span>(RestaurantContext);
  <span class="kw">if</span> (!context) {
    <span class="kw">throw new</span> Error(
      <span class="str">'useRestaurants must be used within a RestaurantProvider'</span>
    );
  }
  <span class="kw">return</span> context;
}</pre>

<h3>Example: useApi (Generic Data Fetching)</h3>
<pre class="code-block"><span class="kw">function</span> <span class="fn">useApi</span>(apiFunction) {
  <span class="kw">const</span> [data, setData] = <span class="fn">useState</span>(<span class="num">null</span>);
  <span class="kw">const</span> [loading, setLoading] = <span class="fn">useState</span>(<span class="num">false</span>);
  <span class="kw">const</span> [error, setError] = <span class="fn">useState</span>(<span class="num">null</span>);

  <span class="kw">const</span> <span class="fn">execute</span> = <span class="kw">async</span> (...args) => {
    <span class="fn">setLoading</span>(<span class="num">true</span>);
    <span class="kw">try</span> {
      <span class="kw">const</span> result = <span class="kw">await</span> <span class="fn">apiFunction</span>(...args);
      <span class="fn">setData</span>(result);
    } <span class="kw">catch</span> (e) {
      <span class="fn">setError</span>(e.message);
    } <span class="kw">finally</span> {
      <span class="fn">setLoading</span>(<span class="num">false</span>);
    }
  };

  <span class="kw">return</span> { data, loading, error, execute };
}</pre>

<h3>Return Types for Custom Hooks</h3>
<table class="compare-table">
<tr><th>Return</th><th>Example</th><th>When to Use</th></tr>
<tr><td>Single value</td><td><code class="inline">return value</code></td><td>Only one thing to return</td></tr>
<tr><td>Array</td><td><code class="inline">return [value, setValue]</code></td><td>Like useState — caller names freely</td></tr>
<tr><td>Object</td><td><code class="inline">return { value, toggle }</code></td><td>Multiple values — most flexible</td></tr>
</table>

<hr>

<h3>useRef Hook</h3>
<p>Returns a mutable ref object <code class="inline">{ current: initialValue }</code> that persists for the full lifetime of the component.</p>

<h3>Three Ways to Store Values</h3>
<table class="compare-table">
<tr><th>Method</th><th>Persists?</th><th>Triggers Re-render?</th></tr>
<tr><td><code class="inline">let/const</code></td><td>No — reset every render</td><td>N/A</td></tr>
<tr><td><code class="inline">useState</code></td><td>Yes</td><td>Yes</td></tr>
<tr><td><code class="inline">useRef</code></td><td>Yes</td><td>No</td></tr>
</table>

<div class="exam-callout"><code class="inline">useRef</code> persists between renders but does NOT trigger re-renders when changed. Use it for values the UI doesn't need to display (timer IDs, DOM refs, previous values).</div>

<h3>Use Case 1: DOM References</h3>
<pre class="code-block"><span class="kw">function</span> <span class="fn">SearchBar</span>() {
  <span class="kw">const</span> inputRef = <span class="fn">useRef</span>(<span class="num">null</span>);

  <span class="fn">useEffect</span>(() => {
    inputRef.current.<span class="fn">focus</span>();  <span class="cm">// Auto-focus on mount</span>
  }, []);

  <span class="kw">const</span> <span class="fn">handleClear</span> = () => {
    <span class="fn">setSearchTerm</span>(<span class="str">''</span>);
    inputRef.current.<span class="fn">focus</span>();  <span class="cm">// Re-focus after clear</span>
  };

  <span class="kw">return</span> &lt;<span class="tag">input</span> <span class="attr">ref</span>={inputRef} <span class="attr">value</span>={searchTerm} /&gt;;
}</pre>

<h3>Use Case 2: Timer/Interval IDs</h3>
<pre class="code-block"><span class="kw">function</span> <span class="fn">Stopwatch</span>() {
  <span class="kw">const</span> [seconds, setSeconds] = <span class="fn">useState</span>(<span class="num">0</span>);
  <span class="kw">const</span> intervalRef = <span class="fn">useRef</span>(<span class="num">null</span>);

  <span class="kw">const</span> <span class="fn">start</span> = () => {
    intervalRef.current = <span class="fn">setInterval</span>(() => {
      <span class="fn">setSeconds</span>(s => s + <span class="num">1</span>);
    }, <span class="num">1000</span>);
  };

  <span class="kw">const</span> <span class="fn">stop</span> = () => {
    <span class="fn">clearInterval</span>(intervalRef.current);
  };

  <span class="cm">// Cleanup on unmount</span>
  <span class="fn">useEffect</span>(() => {
    <span class="kw">return</span> () => <span class="fn">clearInterval</span>(intervalRef.current);
  }, []);

  <span class="kw">return</span> &lt;<span class="tag">div</span>&gt;{seconds}s&lt;/<span class="tag">div</span>&gt;;
}</pre>

<h3>Use Case 3: Tracking Previous Values</h3>
<pre class="code-block"><span class="kw">function</span> <span class="fn">usePrevious</span>(value) {
  <span class="kw">const</span> ref = <span class="fn">useRef</span>();
  <span class="fn">useEffect</span>(() => {
    ref.current = value;   <span class="cm">// Updates AFTER render</span>
  }, [value]);
  <span class="kw">return</span> ref.current;      <span class="cm">// Returns value from previous render</span>
}</pre>

<h3>useEffect Cleanup</h3>
<pre class="code-block"><span class="fn">useEffect</span>(() => {
  <span class="kw">const</span> id = <span class="fn">setInterval</span>(() => { <span class="cm">/* ... */</span> }, <span class="num">1000</span>);

  <span class="cm">// Cleanup function runs:</span>
  <span class="cm">// - On unmount (with empty deps [])</span>
  <span class="cm">// - Before re-run (with deps that changed)</span>
  <span class="kw">return</span> () => <span class="fn">clearInterval</span>(id);
}, []);</pre>

<h3>Decision Guide: useState vs useRef</h3>
<table class="compare-table">
<tr><th>Scenario</th><th>Use</th></tr>
<tr><td>Value displayed in UI</td><td><code class="inline">useState</code></td></tr>
<tr><td>Interval/timer ID</td><td><code class="inline">useRef</code></td></tr>
<tr><td>DOM element access</td><td><code class="inline">useRef</code></td></tr>
<tr><td>Previous value tracking</td><td><code class="inline">useRef</code></td></tr>
<tr><td>Form input value</td><td><code class="inline">useState</code></td></tr>
<tr><td>Render counter (not displayed)</td><td><code class="inline">useRef</code></td></tr>
</table>
`,

comparisons: `
<h2>Key Comparisons (Exam Focus)</h2>
<div class="exam-callout">Your professor's study tips specifically list these comparisons. "Know the differences" is one of the top exam strategies.</div>

<h3>useState vs useReducer</h3>
<table class="compare-table">
<tr><th>Feature</th><th>useState</th><th>useReducer</th></tr>
<tr><td>Best for</td><td>Simple, independent state values</td><td>Complex state with multiple related values</td></tr>
<tr><td>Syntax</td><td><code class="inline">[val, setVal] = useState(init)</code></td><td><code class="inline">[state, dispatch] = useReducer(reducer, init)</code></td></tr>
<tr><td>Updates</td><td>Direct: <code class="inline">setVal(newVal)</code></td><td>Via actions: <code class="inline">dispatch({ type, payload })</code></td></tr>
<tr><td>State shape</td><td>Any single value</td><td>Usually an object with multiple fields</td></tr>
<tr><td>Logic location</td><td>Scattered across event handlers</td><td>Centralized in the reducer function</td></tr>
<tr><td>Testability</td><td>Test via component</td><td>Reducer is a pure function — easy to test in isolation</td></tr>
<tr><td>Pattern similarity</td><td>N/A</td><td>Same as Redux (actions, dispatch, reducer)</td></tr>
</table>

<div class="exam-callout">Use <code class="inline">useState</code> for simple state (boolean toggle, single input). Switch to <code class="inline">useReducer</code> when you have multiple related state variables (loading + data + error) or complex update logic.</div>

<h3>useRef vs useState</h3>
<table class="compare-table">
<tr><th>Feature</th><th>useState</th><th>useRef</th></tr>
<tr><td>Triggers re-render?</td><td><strong>Yes</strong></td><td><strong>No</strong></td></tr>
<tr><td>Persists across renders?</td><td>Yes</td><td>Yes</td></tr>
<tr><td>Returns</td><td><code class="inline">[value, setter]</code></td><td><code class="inline">{ current: value }</code></td></tr>
<tr><td>Use for</td><td>Values displayed in UI</td><td>Timer IDs, DOM refs, previous values</td></tr>
<tr><td>Update method</td><td><code class="inline">setValue(new)</code></td><td><code class="inline">ref.current = new</code></td></tr>
</table>

<pre class="code-block"><span class="cm">// useState — value shown in UI, re-renders on change</span>
<span class="kw">const</span> [count, setCount] = <span class="fn">useState</span>(<span class="num">0</span>);

<span class="cm">// useRef — internal value, NO re-render</span>
<span class="kw">const</span> intervalId = <span class="fn">useRef</span>(<span class="num">null</span>);
intervalId.current = <span class="fn">setInterval</span>(tick, <span class="num">1000</span>);</pre>

<div class="exam-callout">Key rule: If the value is <strong>displayed in the UI</strong>, use <code class="inline">useState</code>. If it's an <strong>internal detail</strong> (timer ID, DOM node, previous value), use <code class="inline">useRef</code>.</div>

<h3>Context API vs Redux</h3>
<table class="compare-table">
<tr><th>Feature</th><th>Context API</th><th>Redux</th></tr>
<tr><td>Built-in?</td><td>Yes (React core)</td><td>No (separate library)</td></tr>
<tr><td>Setup complexity</td><td>Minimal</td><td>More boilerplate</td></tr>
<tr><td>DevTools</td><td>No</td><td>Yes (Redux DevTools)</td></tr>
<tr><td>Middleware</td><td>No</td><td>Yes (thunks, sagas, etc.)</td></tr>
<tr><td>State updates</td><td>useState or useReducer</td><td>Always via dispatch + reducer</td></tr>
<tr><td>Testing</td><td>Wrap with Provider + mock value</td><td>Named export pattern + mock props</td></tr>
<tr><td>Connecting</td><td><code class="inline">useContext(MyContext)</code></td><td><code class="inline">connect(mapState, mapDispatch)</code></td></tr>

{t:'testing',q:'What does toBeNull() assert?',a:'That the value is null. Often used with queryBy: expect(screen.queryByText("Error")).toBeNull()'},
{t:'testing',q:'What is the difference between fireEvent and userEvent?',a:'fireEvent dispatches DOM events directly. userEvent simulates real user interactions more realistically (typing, clicking with focus, etc.).'},
{t:'testing',q:'What does screen.getAllByRole("listitem") return?',a:'An array of all elements matching the "listitem" role. Throws if none found. Use queryAllByRole for empty array when none found.'},
{t:'testing',q:'What is a test fixture?',a:'Predefined test data used across tests. For example, a list of restaurants passed to components during testing.'},
{t:'redux',q:'What happens if you forget the default case in a reducer?',a:'Actions with unrecognized types return undefined instead of the current state. This causes the state to be lost. Always include default: return state.'},
{t:'redux',q:'What is the purpose of the payload in an action?',a:'Carries the data needed for the state update. For example: { type: "ADD_TODO", payload: "Buy milk" } — "Buy milk" is the payload.'},
{t:'redux',q:'What is a "slice" in Redux?',a:'A portion of the overall state managed by one reducer. With combineReducers, each reducer manages its own slice: state.restaurants, state.users, etc.'},
{t:'redux',q:'Why use arrow function syntax for thunks?',a:'const loadRestaurants = () => async (dispatch, getState, api) => {...} — the outer arrow returns the inner thunk function.'},
{t:'context',q:'What is the "Provider pattern"?',a:'A component that holds state and provides it to children via Context. Contains the state, functions, and wraps children with Context.Provider.'},
{t:'context',q:'What error do you get if you destructure from useContext without a Provider?',a:'TypeError: Cannot destructure property of undefined. The context value is undefined because no Provider exists above.'},
{t:'context',q:'Can you update Context value from a child component?',a:'Yes — include setter functions (like setTheme, loadRestaurants) in the context value. Children call these to update the Provider\'s state.'},
{t:'reducer',q:'What is the flow of data with useReducer + Context?',a:'Component calls dispatch(action) → reducer processes action → returns new state → Provider re-renders → consumers get new state via useContext.'},
{t:'reducer',q:'What does LOAD_ERROR action do in the reducer?',a:'Sets loading: false and error: action.payload (the error message). The UI can display the error message to the user.'},
{t:'reducer',q:'What is the purpose of the ADD_RESTAURANT action?',a:'Adds a new restaurant to the array: return { ...state, restaurants: [...state.restaurants, action.payload] }. Immutably adds to the list.'},
{t:'reducer',q:'How do you send an authenticated API request in the lab?',a:'Include the token in the Authorization header: headers: { Authorization: "Bearer " + token }. The server\'s checkAuth middleware verifies it.'},
{t:'memo',q:'What is referential equality?',a:'Two values are referentially equal if they point to the same object in memory. {} !== {} (different references) even though they look the same.'},
{t:'memo',q:'Why does React use shallow comparison for React.memo?',a:'Deep comparison is expensive. Shallow comparison only checks top-level props by reference — fast but requires stable references for objects/functions.'},
{t:'memo',q:'What problem does useCallback solve in useEffect dependency arrays?',a:'Without useCallback, a function recreated each render makes useEffect run every render. useCallback keeps the same reference, so useEffect only runs when deps truly change.'},
{t:'memo',q:'What is the syntax for useMemo?',a:'const value = useMemo(() => computeExpensiveValue(deps), [deps]) — factory function + dependency array.'},
{t:'hooks',q:'What is the lazy initializer pattern in useState?',a:'useState(() => expensiveComputation()) — the function only runs on the initial render, not on every re-render. Useful for expensive initialization.'},
{t:'hooks',q:'How do you access the DOM element via ref?',a:'Create ref with useRef(null), attach with <input ref={myRef} />, then access via myRef.current (the actual DOM node).'},
{t:'hooks',q:'What is a "stale closure" problem?',a:'A function captures old values from a previous render. Common in setInterval callbacks. Fix with functional updater: setCount(c => c + 1) instead of setCount(count + 1).'},
{t:'hooks',q:'Why must hooks be called in the same order every render?',a:'React tracks hooks by their call order (not by name). If order changes (e.g., due to conditions), React maps hooks to wrong state, causing bugs.'},
{t:'hooks',q:'What makes a custom hook different from a regular function?',a:'A custom hook calls other hooks (useState, useEffect, etc.). Regular functions cannot call hooks. The "use" prefix signals this to React and linters.'},
{t:'hooks',q:'What does the cleanup function in useEffect prevent?',a:'Memory leaks and stale side effects. It cleans up timers, subscriptions, and event listeners before the component unmounts or the effect re-runs.'},
{t:'hooks',q:'In the Stopwatch lab, what happens without the useEffect cleanup?',a:'The setInterval keeps running after the component unmounts, causing a memory leak and potential errors from updating unmounted component state.'},
{t:'testing',q:'What is the purpose of test isolation?',a:'Each test should be independent — not affected by or affecting other tests. Fresh mocks, clean renders, no shared mutable state between tests.'},
{t:'tdd',q:'What does "test behavior, not implementation" mean?',a:'Tests should verify what the code does (outputs, side effects visible to users), not how it does it internally. Implementation can change; behavior should not.'},
];
