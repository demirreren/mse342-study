{q:'What is a Thunk in the context of Redux?',o:['A function that returns another function, used for async operations','A type of reducer that handles multiple actions at once','A special type of action that contains no payload data','A method for combining multiple reducers into a single store'],a:0,e:'(From exam guidelines) A thunk is an action creator that returns a function instead of an object. The function can do async work before dispatching.'},
{q:'What does mapDispatchToProps do in a connected component?',o:['It selects parts of the Redux state and passes them as props','It defines the initial state that the reducer will use on mount','It validates the types of props passed to the connected component','It makes action creators available as props that dispatch when called'],a:3,e:'(From exam guidelines) mapDispatchToProps maps action creators to props, auto-wrapping them in dispatch().'},
{q:'Given state { products: [\'Chair\', \'Table\'], isLoading: false, errorMessage: null } and action { type: \'ADD_PRODUCT\', payload: \'Lamp\' }, what is the new state?',o:['{ products: [\'Chair\', \'Table\', \'Lamp\'], isLoading: false, errorMessage: null }','{ products: [\'Lamp\'], isLoading: false, errorMessage: null }','{ products: [\'Lamp\', \'Chair\', \'Table\'], isLoading: false, errorMessage: null }','{ products: [\'Chair\', \'Table\'], isLoading: true, errorMessage: null }'],a:0,e:'(From exam guidelines) ADD_PRODUCT spreads existing products and appends the payload. Other fields preserved via ...state.'},
{q:'Which package is used on the server (Node.js) to verify Firebase tokens?',o:['firebase','firebase-admin','firebase-client','firebase-verify'],a:1,e:'(From exam guidelines) firebase-admin is the server-side SDK for admin operations like verifyIdToken.'},
{q:'What must every Redux action have?',o:['A payload field','A type field','A dispatch field','A reducer field'],a:1,e:'Every Redux action must be a plain object with a "type" field (string). Payload is optional.'},
{q:'What is a Redux reducer?',o:['A function that reduces array size','A pure function: (state, action) => newState','A middleware function','A React component'],a:1,e:'A reducer takes the current state and an action, and returns a new state object. Must be pure.'},
{q:'Why must reducers not mutate state?',o:['JavaScript doesn\'t allow it','React can\'t detect changes to mutated objects','It causes syntax errors','It slows performance'],a:1,e:'React uses reference equality to detect changes. Mutating the same object doesn\'t create a new reference, so React won\'t re-render.'},
{q:'Which is the correct way to add an item in a reducer?',o:['state.push(item); return state;','return [...state, item]','state.concat(item)','return state.add(item)'],a:1,e:'return [...state, item] creates a new array with the existing items plus the new one. Never use push (mutation).'},
{q:'What does mapStateToProps do?',o:['Dispatches actions','Maps Redux state to component props','Creates the Redux store','Defines reducers'],a:1,e:'mapStateToProps is a function that extracts data from the Redux store and passes it as props to the component.'},
{q:'What does mapDispatchToProps object shorthand do?',o:['Calls each action creator immediately','Auto-wraps each action creator in dispatch()','Creates new reducers','Maps state to dispatch'],a:1,e:'Object shorthand { loadRestaurants } automatically wraps loadRestaurants in dispatch() when called from the component.'},
{q:'What is a Redux thunk?',o:['A special reducer','An action creator that returns a function','A type of store','A testing utility'],a:1,e:'A thunk is an action creator that returns a function (instead of an object). The function can do async work and dispatch actions.'},
{q:'What arguments does a thunk function receive?',o:['(state, action)','(dispatch, getState, extraArg)','(store, action)','(props, context)'],a:1,e:'The thunk function receives (dispatch, getState, extraArg) — dispatch for dispatching actions, getState for reading state, extraArg for injected dependencies.'},
{q:'How do you inject a mock API for testing thunks?',o:['jest.mock("api")','thunk.withExtraArgument(mockApi)','store.setApi(mockApi)','dispatch.inject(mockApi)'],a:1,e:'thunk.withExtraArgument(api) injects the API as the third arg. In tests, pass a mock API.'},
{q:'What wraps the entire app to provide the Redux store?',o:['<StoreProvider>','<Provider store={store}>','<ReduxWrapper>','<Store.Provider>'],a:1,e:'<Provider store={store}> from react-redux makes the store available to all child components.'},
{q:'What does combineReducers do?',o:['Merges two stores','Combines multiple reducers into one root reducer','Combines actions','Merges middleware'],a:1,e:'combineReducers({ restaurants: restaurantsReducer, users: usersReducer }) creates a root reducer with state slices.'},
{q:'What is the correct store test pattern for thunks?',o:['Mock the reducer','Create store with mock API, dispatch thunk, check state','Mock the component, check props','Test the action creator in isolation'],a:1,e:'Create a real store with thunk.withExtraArgument(mockApi), dispatch the thunk, then assert on store.getState().'},
{q:'When is Redux appropriate to use?',o:['For small, simple apps','For large state shared across many components with complex update logic','Always','Only for forms'],a:1,e:'Redux is appropriate for large apps with state shared across many components and complex update logic.'},
{q:'What does store.getState() return?',o:['The reducer function','The current state object','The list of actions','The middleware chain'],a:1,e:'store.getState() returns the current state tree of the Redux store.'},
{q:'What does applyMiddleware(thunk) do?',o:['Applies CSS middleware','Adds thunk middleware to the Redux store','Creates a new middleware','Removes default middleware'],a:1,e:'applyMiddleware(thunk) enhances createStore to support thunk action creators (functions instead of objects).'},
{q:'How do you remove an item from a Redux state array immutably?',o:['state.splice(index, 1)','state.filter(item => item.id !== id)','delete state[index]','state.pop()'],a:1,e:'filter creates a new array excluding the item. splice/delete/pop all mutate the original array.'},
{q:'How do you update one item in a Redux array immutably?',o:['state[index] = newItem','state.map(i => i.id === id ? {...i, done: true} : i)','state.find(i => i.id === id).done = true','state.replace(id, newItem)'],a:1,e:'map returns a new array, replacing the matching item with a new object using spread.'},
{q:'What is the role of connect() in React-Redux?',o:['Connects to the database','Creates a higher-order component that maps state/dispatch to props','Connects to the server','Connects hooks to Redux'],a:1,e:'connect(mapState, mapDispatch)(Component) creates a HOC that passes Redux data as props.'},
{q:'What happens when you dispatch an unknown action type?',o:['An error is thrown','The default case returns current state unchanged','The store resets','Nothing at all'],a:1,e:'The reducer\'s default case returns the current state, so unknown actions are safely ignored.'},
{q:'What is the relationship between actions and reducers?',o:['Actions call reducers','Reducers listen for action types and update state accordingly','Actions contain reducers','Reducers dispatch actions'],a:1,e:'Actions describe WHAT happened. Reducers decide HOW state changes based on the action type.'},
{q:'What is the correct way to update a nested object in Redux state?',o:['state.user.name = "new"','{ ...state, user: { ...state.user, name: "new" } }','state.set("user.name", "new")','Object.assign(state.user, { name: "new" })'],a:1,e:'Spread at each level of nesting to create new objects. Never mutate directly.'},
{q:'Why does Redux use a single store?',o:['For performance','Single source of truth — easier to debug, test, and track state changes','JavaScript limitation','React requires it'],a:1,e:'A single store provides a single source of truth, making state predictable and debuggable.'},
{q:'What does the connect() HOC return?',o:['A reducer','A new component with Redux state/dispatch mapped to props','A store','An action'],a:1,e:'connect() returns a higher-order component that wraps the original, injecting Redux data as props.'},
{q:'How do you handle loading state in Redux?',o:['Use a separate store','Dispatch a LOADING action before async work, then SUCCESS or ERROR after','Use setTimeout','Use useRef'],a:1,e:'Pattern: dispatch(loading) → await async work → dispatch(success/error). The reducer tracks loading: true/false.'},
],

context:[
{q:'What function creates a new Context?',o:['React.createState()','createContext()','new Context()','useContext()'],a:1,e:'createContext() creates a Context object. You can pass a default value: createContext(defaultValue).'},
{q:'Which hook consumes a Context value?',o:['useState','useReducer','useContext','useEffect'],a:2,e:'useContext(MyContext) returns the current value of the context from the nearest Provider above.'},
{q:'What happens if useContext is used without a Provider?',o:['It throws an error','It returns the default value from createContext()','It returns null always','The app crashes'],a:1,e:'Without a Provider, useContext returns the default value passed to createContext(). If none was passed, it returns undefined.'},
{q:'In the Provider pattern, what is the "value" prop?',o:['The component\'s state','The data/functions shared with all consumers','The component\'s children','The component\'s key'],a:1,e:'The value prop of Context.Provider is the data that all consumers can access via useContext().'},
{q:'How should you test a component that uses useContext?',o:['Mock useContext','Wrap with <Context.Provider value={testData}>','Don\'t test it','Use shallow rendering'],a:1,e:'Wrap the component with the Context Provider and pass test values. Use a renderWithContext helper for convenience.'},
{q:'What is prop drilling?',o:['Drilling holes in props','Passing data through components that don\'t need it','Creating new props','Removing props from components'],a:1,e:'Prop drilling = passing state through intermediate components that don\'t use it, just to reach a deeply nested child.'},
{q:'Context API is best for:',o:['All applications','Small-to-medium apps with shared state','Only class components','Replacing all state management'],a:1,e:'Context is great for small-to-medium apps. For large, complex state with DevTools needs, consider Redux.'},
{q:'What does the children prop represent in a Provider?',o:['Child components','The JSX wrapped inside the Provider','Provider configuration','Context actions'],a:1,e:'{children} is whatever JSX is placed between the Provider tags: <Provider>{children}</Provider>.'},
{q:'How do you share multiple contexts?',o:['Create one big context','Nest multiple Providers','Use Redux instead','Combine with combineContexts()'],a:1,e:'Nest Providers: <AuthProvider><ThemeProvider><App/></ThemeProvider></AuthProvider>. Each context is independent.'},
{q:'Which is NOT true about Context vs Redux?',o:['Context is built-in to React','Redux has DevTools','Context supports middleware','Redux requires a separate library'],a:2,e:'Context does NOT support middleware. Redux has middleware support (like thunks). Context is simpler but less powerful.'},
{q:'What is the renderWithContext helper pattern?',o:['A Cypress helper','A test helper that wraps components in a Provider with default/override values','A Redux testing pattern','A production code pattern'],a:1,e:'renderWithContext({ loading: true }) merges overrides with default context values and wraps the component in a Provider.'},
{q:'What should you test for each context state?',o:['Only the success state','Loading, error, success, and empty states','Only error states','Only the initial state'],a:1,e:'Test all states: loading (spinner), error (error message), success (data displayed), empty (no data message).'},
{q:'Can a component consume multiple contexts?',o:['No, only one','Yes, by calling useContext multiple times','Only with Redux','Only in class components'],a:1,e:'A component can call useContext() multiple times with different Context objects to consume multiple contexts.'},
{q:'What is the scope of a Context Provider?',o:['The entire app','Only components inside the Provider','Only the Provider itself','All sibling components'],a:1,e:'Only components that are descendants (children) of the Provider can access the context value.'},
{q:'When Provider\'s value changes, what happens?',o:['Nothing','All consumers re-render','Only the Provider re-renders','The app reloads'],a:1,e:'When the Provider\'s value changes, all components consuming that context via useContext will re-render.'},
{q:'What is the default value in createContext(defaultVal)?',o:['Initial state for Provider','Fallback value when no Provider exists above','Always used','Component props default'],a:1,e:'The default is only used when a component calls useContext without any Provider above it in the tree.'},
{q:'How does Context solve prop drilling?',o:['By creating global variables','By letting any child read shared values without props passing through intermediaries','By using Redux','By caching props'],a:1,e:'Context lets any descendant access shared values directly via useContext, skipping intermediate components.'},
{q:'What pattern do you use to test different context states?',o:['Mock useContext','Create separate renderWithContext calls with different overrides','Use different test files','Skip testing context'],a:1,e:'renderWithContext({ loading: true }), renderWithContext({ error: "fail" }), etc. — test each state separately.'},
{q:'What is the advantage of Context over prop drilling?',o:['Better performance','Any descendant can read values directly without props through intermediaries','Context is faster','Context has DevTools'],a:1,e:'Context eliminates the need to pass props through components that don\'t use them.'},
{q:'What is the common mistake when using Context?',o:['Too many providers','Forgetting to wrap consumers with the Provider component','Using too many values','Creating too many contexts'],a:1,e:'Using useContext outside the Provider tree returns undefined, causing runtime errors. Always wrap consumers.'},
{q:'Can Context replace all state management?',o:['Yes, always','For simple-to-medium cases; Redux is better for complex state with DevTools and middleware needs','No, never','Only with TypeScript'],a:1,e:'Context works well for simpler cases. Complex apps benefit from Redux\'s DevTools, middleware, and ecosystem.'},
],

reducer:[
{q:'What does useReducer return?',o:['[state, setState]','[state, dispatch]','[reducer, state]','[action, dispatch]'],a:1,e:'useReducer returns [state, dispatch]. state is the current state, dispatch sends actions to the reducer.'},
{q:'What is the signature of a useReducer reducer function?',o:['(action) => state','(state, action) => newState','(dispatch, state) => action','(props) => state'],a:1,e:'Same as Redux: (state, action) => newState. Takes current state + action, returns new state.'},
{q:'When should you prefer useReducer over useState?',o:['Always','When you have multiple related state variables or complex update logic','For simple boolean toggles','Only in class components'],a:1,e:'useReducer shines when state is complex, has multiple sub-values, or when updates depend on previous state.'},
{q:'What is the format of the Authorization header for Firebase?',o:['Token: <jwt>','Authorization: Bearer <token>','Auth: <token>','X-Firebase-Token: <token>'],a:1,e:'The standard format is: Authorization: Bearer <token> — the word Bearer, a space, then the JWT.'},
{q:'What does admin.auth().verifyIdToken(token) do?',o:['Creates a new token','Verifies the token is valid and returns decoded user info','Refreshes the token','Deletes the token'],a:1,e:'verifyIdToken() checks the JWT signature, expiration, and returns the decoded token with user info.'},
{q:'What happens when a Firebase ID token expires?',o:['User is logged out','It\'s automatically refreshed via refresh token','The app crashes','Nothing'],a:1,e:'Firebase SDK automatically refreshes expired tokens using the refresh token. getIdToken() always returns a valid token.'},
{q:'How long does a Firebase ID token last?',o:['24 hours','1 hour','30 minutes','Forever'],a:1,e:'Firebase ID tokens expire after 1 hour. They are automatically refreshed using the refresh token.'},
{q:'Which package is used on the server for Firebase?',o:['firebase','firebase-admin','firebase-server','@firebase/auth'],a:1,e:'Server uses firebase-admin for admin operations. Client uses firebase for user-facing auth.'},
{q:'What does the checkAuth middleware attach to the request?',o:['req.token','req.user (decoded token info)','req.auth','req.firebase'],a:1,e:'After verification, checkAuth sets req.user = decoded (the decoded JWT payload with user info), then calls next().'},
{q:'What status code does checkAuth return for invalid tokens?',o:['403','401','500','400'],a:1,e:'401 Unauthorized is returned when the token is missing, malformed, or invalid.'},
{q:'How do you dispatch an action with useReducer?',o:['setState({ type: "X" })','dispatch({ type: "ACTION_TYPE", payload: data })','reduce({ type: "X" })','call({ action: "X" })'],a:1,e:'Call dispatch() with an action object: dispatch({ type: "LOAD_SUCCESS", payload: data }).'},
{q:'What is the service account key for Firebase?',o:['A public API key','A JSON file with private credentials for server admin access','A user password','An OAuth token'],a:1,e:'The service account key is a JSON file containing private credentials for firebase-admin. Must NEVER be committed to git.'},
{q:'Why are useReducer reducers easy to test?',o:['They use React hooks','They are pure functions: same input always gives same output','They are async','They use the DOM'],a:1,e:'Pure functions have no side effects — given (state, action), they always return the same new state. Easy to assert.'},
{q:'What actions does the restaurant reducer in the lab handle?',o:['LOAD_START, LOAD_SUCCESS, LOAD_ERROR','FETCH, RECEIVE, FAIL','GET, SET, DELETE','START, STOP, RESET'],a:0,e:'The lab uses LOAD_START (set loading), LOAD_SUCCESS (set data), LOAD_ERROR (set error), plus ADD_RESTAURANT and CLEAR_ERROR.'},
{q:'useReducer + Context is similar to Redux but lacks:',o:['Actions and dispatch','DevTools and middleware','State management','Components'],a:1,e:'useReducer+Context uses the same pattern (actions, dispatch, reducer) but lacks Redux DevTools and middleware support.'},
{q:'What is the initialState object typically contain for a data-fetching reducer?',o:['Only data','data (empty array), loading (false), error (null)','Just a boolean','A function'],a:1,e:'initialState = { restaurants: [], loading: false, error: null } — covers all possible states of a data fetch.'},
{q:'What does the CLEAR_ERROR action do?',o:['Clears all state','Sets error to null','Removes the reducer','Restarts the app'],a:1,e:'case "CLEAR_ERROR": return { ...state, error: null } — clears the error so user can retry.'},
{q:'How does the server know which user made a request?',o:['Cookies','The decoded JWT attached to req.user by checkAuth','URL parameters','Session storage'],a:1,e:'checkAuth verifies the JWT and attaches the decoded token (with user ID, email, etc.) to req.user.'},
{q:'What is a PrivateRoute in Firebase auth?',o:['A server-only route','A component that redirects unauthenticated users to login','An encrypted endpoint','A route with rate limiting'],a:1,e:'PrivateRoute checks isLoggedIn from AuthContext — renders the route if true, redirects to login if false.'},
{q:'What happens on the server when verifyIdToken fails?',o:['It returns null','It throws an error (caught by try/catch, returns 401)','It creates a new token','It logs the user in'],a:1,e:'verifyIdToken throws if the token is expired, malformed, or forged. The catch block returns 401 Unauthorized.'},
{q:'What is onAuthStateChanged used for?',o:['Changing passwords','Listening for sign-in/sign-out events to update UI','Creating users','Server authentication'],a:1,e:'onAuthStateChanged fires whenever auth state changes (login, logout, token refresh) — keeps UI in sync.'},
{q:'What does the dispatched LOAD_ERROR action typically carry?',o:['The HTTP status code','The error message in the payload','The failed request','The retry count'],a:1,e:'dispatch({ type: "LOAD_ERROR", payload: error.message }) stores the error message for display.'},
{q:'In useReducer, where is async logic placed?',o:['Inside the reducer','In the Provider functions that call dispatch','In the action objects','In the initialState'],a:1,e:'Reducers must be pure (no async). Async logic goes in the functions that dispatch actions (e.g., loadRestaurants in Provider).'},
{q:'How does useReducer improve over multiple useState calls?',o:['Better performance','Centralizes related state logic in one reducer, making transitions explicit','Better TypeScript support','Enables DevTools'],a:1,e:'useReducer groups related state (data, loading, error) and makes transitions explicit via named actions.'},
],

memo:[
{q:'What does useMemo memoize?',o:['Functions','Components','Computed values','DOM elements'],a:2,e:'useMemo memoizes a computed value. It only recalculates when dependencies change.'},
{q:'What does useCallback memoize?',o:['Computed values','Function references','Components','Promises'],a:1,e:'useCallback returns the same function reference across renders unless dependencies change.'},
{q:'What does React.memo do?',o:['Memoizes state','Memoizes a component — skips re-render if props unchanged','Memoizes context','Creates a memo object'],a:1,e:'React.memo wraps a component and performs shallow comparison of props. If props haven\'t changed, skip re-render.'},
{q:'useCallback(fn, deps) is equivalent to:',o:['useMemo(fn, deps)','useMemo(() => fn, deps)','React.memo(fn, deps)','useRef(fn)'],a:1,e:'useCallback(fn, deps) === useMemo(() => fn, deps). Both cache; useCallback is shorthand for caching functions.'},
{q:'Why does passing an inline arrow function defeat React.memo?',o:['Arrow functions are slow','A new function reference is created each render','Arrow functions can\'t be memoized','React.memo doesn\'t support functions'],a:1,e:'() => doSomething() creates a new reference every render, so React.memo sees "new" props and re-renders.'},
{q:'How do you fix the inline function + React.memo problem?',o:['Use useRef','Use useCallback to memoize the function','Remove React.memo','Use a class component'],a:1,e:'Wrap the function in useCallback so it maintains the same reference across renders.'},
{q:'What is the dependency array in useMemo?',o:['Variables the function modifies','Values that trigger recalculation when changed','The function\'s parameters','Required imports'],a:1,e:'The dependency array lists values the computation depends on. useMemo recomputes only when a dep changes.'},
{q:'Why memoize a Context value object?',o:['To make it immutable','Without useMemo, a new object is created every render, causing all consumers to re-render','To prevent errors','For TypeScript compatibility'],a:1,e:'Every render creates a new object reference → Context consumers see "new" value → unnecessary re-renders. useMemo prevents this.'},
{q:'Can React.memo accept a custom comparison function?',o:['No','Yes: React.memo(Comp, (prev, next) => boolean)','Only in class components','Only with useCallback'],a:1,e:'React.memo(Component, arePropsEqual) — return true to skip re-render, false to allow it.'},
{q:'When should you NOT use memoization?',o:['For expensive calculations','For cheap/simple calculations where overhead exceeds savings','For functions in useEffect deps','For context values'],a:1,e:'Memoization adds complexity and memory overhead. Don\'t use it for trivial calculations — measure first.'},
{q:'Which combination prevents unnecessary context consumer re-renders?',o:['useState + useRef','useCallback (functions) + useMemo (context value)','React.memo only','useReducer only'],a:1,e:'Use useCallback for functions in context, then useMemo for the context value object. This stabilizes references.'},
{q:'What does an empty dependency array [] in useCallback mean?',o:['Function recalculates every render','Function never changes — same reference always','Function runs once','Function has no dependencies'],a:1,e:'Empty deps means the function reference is created once and never changes. The function "closes over" initial values.'},
{q:'React.memo uses which comparison by default?',o:['Deep equality','Shallow comparison of props','Reference equality only','JSON.stringify comparison'],a:1,e:'React.memo performs a shallow comparison of all props by default.'},
{q:'What is the return type of useMemo?',o:['Always a function','The memoized value (any type)','A ref object','A tuple'],a:1,e:'useMemo returns whatever the factory function returns — a number, string, object, array, etc.'},
{q:'useMemo(() => items.filter(predicate), [items]) will recompute when:',o:['On every render','Only when items changes','Only when predicate changes','Never'],a:1,e:'The filtered result only recomputes when items changes, since items is the sole dependency.'},
{q:'What causes an infinite re-render loop with useEffect and functions?',o:['Using useState','A function in useEffect deps creates new ref each render → re-triggers effect → re-renders','Using useRef','Multiple useEffect calls'],a:1,e:'Without useCallback, the function reference changes every render → useEffect runs → state updates → re-render → repeat.'},
{q:'How does useCallback prevent infinite loops in useEffect?',o:['It prevents useEffect from running','It keeps the same function reference, so useEffect deps don\'t change','It memoizes the effect','It cancels previous effects'],a:1,e:'useCallback returns a stable function reference. Since the dep doesn\'t change, useEffect won\'t re-trigger.'},
{q:'What is the difference between useMemo and React.memo?',o:['They are the same','useMemo memoizes values inside a component; React.memo memoizes the entire component','useMemo is for classes','React.memo is for hooks'],a:1,e:'useMemo caches a computed value within a component. React.memo wraps a component to skip re-renders if props are unchanged.'},
{q:'When does React.memo NOT help?',o:['When props are primitive values','When new objects/functions are passed as props (different reference each render)','When the component is small','When using hooks'],a:1,e:'If props include new objects/functions each render, shallow comparison sees different references → React.memo re-renders anyway.'},
{q:'What is the performance impact of unnecessary re-renders?',o:['None','Wasted computation recalculating components/DOM that haven\'t changed','Memory leaks','Network requests'],a:1,e:'Unnecessary re-renders waste CPU cycles re-running component functions and diffing the virtual DOM.'},
{q:'How do you memoize an event handler in a parent component?',o:['Use useMemo','Use useCallback with appropriate deps','Use useRef','Use React.memo'],a:1,e:'useCallback memoizes the function reference, preventing child re-renders if the child is wrapped in React.memo.'},
{q:'What triggers a re-render in React?',o:['Only state changes','State changes, prop changes, or parent re-rendering','Only prop changes','Only context changes'],a:1,e:'A component re-renders when its state changes, its props change, or its parent re-renders.'},
{q:'Is useMemo needed for simple expressions like x + y?',o:['Yes, always memoize','No — the overhead of useMemo exceeds the cost of adding two numbers','Only in production','Only for large numbers'],a:1,e:'useMemo adds memory and comparison overhead. For trivial calculations, it costs more than just recalculating.'},
{q:'What problem does memoizing context values solve?',o:['TypeScript errors','Prevents all context consumers from re-rendering when Provider re-renders but value hasn\'t changed','Enables server-side rendering','Reduces bundle size'],a:1,e:'Without memoization, every Provider render creates a new value object reference, triggering all consumer re-renders.'},
],

hooks:[
{q:'What must a custom hook name start with?',o:['"get"','"use"','"hook"','"custom"'],a:1,e:'Custom hooks must start with "use" — this convention lets React enforce the Rules of Hooks.'},
{q:'Do two components using the same custom hook share state?',o:['Yes, always','No — each gets independent state','Only if in the same Provider','Only for useRef'],a:1,e:'Custom hooks share logic, not state. Each component calling the hook gets its own independent state.'},
{q:'Where can hooks be called?',o:['Inside loops and conditions','Only at the top level of React functions or custom hooks','Anywhere in JavaScript','Inside class components'],a:1,e:'Hooks must be called at the top level — not inside loops, conditions, or nested functions. Only from React functions.'},
{q:'What does useRef(null) return?',o:['null','{ current: null }','A DOM element','undefined'],a:1,e:'useRef returns a mutable ref object: { current: initialValue }. With null, it returns { current: null }.'},
{q:'Does updating ref.current trigger a re-render?',o:['Yes','No','Only if the ref is attached to DOM','Only on mount'],a:1,e:'No. Unlike useState, changing ref.current does not cause a re-render. The component won\'t update.'},
{q:'Why use useRef for interval IDs instead of a variable?',o:['Variables are faster','Regular variables reset every render; useRef persists across renders','useRef is required for intervals','Variables can\'t hold numbers'],a:1,e:'A let/const variable is re-created on each render. useRef.current persists the value so you can clear the interval later.'},
{q:'What does useEffect cleanup function do?',o:['Cleans the DOM','Runs on unmount or before re-run to clean up side effects','Cleans props','Resets state'],a:1,e:'The cleanup function (returned from useEffect) runs on unmount ([] deps) or before the effect re-runs (when deps change).'},
{q:'How do you auto-focus an input on mount?',o:['input.focus() in render','useRef + useEffect: ref.current.focus() in effect with [] deps','useState(true)','useCallback(() => focus())'],a:1,e:'Create a ref, attach to input, then in useEffect([] deps), call ref.current.focus().'},
{q:'What does usePrevious(value) typically use internally?',o:['useState','useRef + useEffect','useCallback','useReducer'],a:1,e:'usePrevious uses a ref updated in useEffect. The ref holds the old value; useEffect updates it after render.'},
{q:'What are the three return types for custom hooks?',o:['String, Number, Boolean','Single value, Array, Object','Component, Element, Node','Promise, Callback, Observable'],a:1,e:'Return a single value, an array (like useState: [val, setVal]), or an object ({ val, fn }) for maximum flexibility.'},
{q:'What does useToggle typically return?',o:['Just a boolean','{ value, toggle, setTrue, setFalse }','[value, setValue]','A ref object'],a:1,e:'useToggle returns the boolean value plus toggle(), setTrue(), and setFalse() functions.'},
{q:'What does the useRestaurants custom hook do?',o:['Fetches restaurants from API','Wraps useContext with error checking for missing Provider','Creates restaurant state','Renders restaurant list'],a:1,e:'useRestaurants calls useContext(RestaurantContext) and throws an error if the context is undefined (used outside Provider).'},
{q:'let/const vs useState vs useRef: which persists between renders?',o:['Only let/const','useState and useRef','Only useState','All three'],a:1,e:'let/const resets every render. useState persists + triggers re-render. useRef persists without re-render.'},
{q:'What is the correct useEffect pattern for running code once on mount?',o:['useEffect(fn)','useEffect(fn, [])','useEffect(fn, [true])','useEffect([], fn)'],a:1,e:'useEffect(fn, []) — empty dependency array means the effect runs once after initial render (mount).'},
{q:'In useEffect, when does the cleanup run if deps = []?',o:['Every render','On unmount only','On mount','Never'],a:1,e:'With empty deps, the cleanup function runs once when the component unmounts.'},
{q:'How do you clear a search input and re-focus it?',o:['setSearchTerm(""); inputRef.current.focus()','inputRef.current.value = ""','searchRef.clear()','useState("")'],a:0,e:'Set the state to empty string with setSearchTerm(""), then call inputRef.current.focus() to return focus to the input.'},
{q:'What makes useRef different from useState?',o:['useRef is faster','useRef persists values without triggering re-renders','useRef can only hold DOM elements','useRef resets on unmount'],a:1,e:'useState triggers re-render when updated. useRef persists values between renders but changing .current does NOT re-render.'},
{q:'What should you use for a value displayed in the UI?',o:['useRef','useState','let variable','useCallback'],a:1,e:'If the value needs to be displayed and the UI should update when it changes, use useState (triggers re-render).'},
{q:'What is the RenderCounter demo purpose in the lab?',o:['Count API calls','Show that useRef doesn\'t trigger re-renders while useState does','Measure performance','Count component instances'],a:1,e:'RenderCounter demonstrates that updating a useRef counter doesn\'t cause re-renders, while useState does.'},
{q:'What does ref.current.focus() do?',o:['Blurs the element','Sets keyboard focus to the DOM element referenced by the ref','Creates a new ref','Scrolls to the element'],a:1,e:'ref.current is the actual DOM node. .focus() is a native DOM method that gives that element keyboard focus.'},
{q:'When does useEffect cleanup run with deps [value]?',o:['Only on unmount','Before the effect re-runs when value changes, AND on unmount','Every render','On mount only'],a:1,e:'With deps, cleanup runs before the effect re-runs (when deps change) AND on component unmount.'},
{q:'What is the lazy initializer in useState?',o:['A Promise','A function passed to useState that runs only on first render','A timeout','A generator'],a:1,e:'useState(() => computeExpensiveValue()) runs the function only once on mount, not on every re-render.'},
{q:'Why throw an error in a custom context hook when context is undefined?',o:['For performance','To provide a clear error message when the hook is used outside its Provider','To prevent rendering','To enable DevTools'],a:1,e:'Without the check, you get confusing "cannot destructure undefined" errors. The thrown error clearly states the fix.'},
{q:'What is the purpose of the [key, value] dependency array in useLocalStorage?',o:['Performance only','Re-sync localStorage when either key or value changes','TypeScript requirement','No purpose'],a:1,e:'When value changes, update storage. When key changes, write to the new key. Both deps are needed.'},
{q:'What does useEffect(() => { ref.current = value }, [value]) do?',o:['Updates state','Saves the current value in the ref AFTER render (for tracking previous values)','Triggers a re-render','Creates a new ref'],a:1,e:'useEffect runs after render, so ref.current is updated to the latest value. On the next render, ref.current holds the previous value.'},
{q:'How does the Stopwatch lab exercise use useRef?',o:['For the display','Stores the setInterval ID so it can be cleared later without causing re-renders','For CSS animation','For the button'],a:1,e:'intervalRef.current = setInterval(...) stores the ID. clearInterval(intervalRef.current) stops it. No re-renders needed.'},
{q:'What is the benefit of returning an object from a custom hook?',o:['Better performance','Named destructuring — callers use exact property names, more readable than positional arrays','Required by React','Enables memoization'],a:1,e:'const { data, loading, error } = useApi(fn) is more readable than const [a, b, c] = useApi(fn).'},
{q:'What is the functional updater pattern in useState?',o:['useState(function)','setValue(prevValue => newValue) — ensures you have the latest state','setValue.update()','useState.functional()'],a:1,e:'setValue(v => !v) uses the latest state value, avoiding stale closures. Essential in callbacks and intervals.'},
{q:'What two hooks does useLocalStorage combine?',o:['useRef + useCallback','useState + useEffect','useReducer + useMemo','useContext + useRef'],a:0,e:'useLocalStorage uses useState for the value and useEffect to sync it with localStorage when it changes.'},
{q:'How does the clear-and-refocus pattern work in the lab?',o:['setSearchTerm(""); inputRef.current.focus()','inputRef.current.clear()','clearInput(ref)','ref.reset()'],a:0,e:'Set state to empty string (clears input value), then call focus() on the DOM ref to return keyboard focus.'},

code:`// themeReducer.js
export const initialState = {
  darkMode: false,
  fontSize: 'medium'
};
export function themeReducer(state = initialState, action) {
  switch (action.type) {
    case 'TOGGLE_DARK_MODE':
      return { ...state, darkMode: !state.darkMode };
    case 'SET_FONT_SIZE':
      return { ...state, fontSize: action.payload };
    default:
      return state;
  }
}

// ThemeContext.js
import { createContext, useReducer } from 'react';
import { themeReducer, initialState } from './themeReducer';
export const ThemeContext = createContext();
export const ThemeProvider = ({ children }) => {
  const [state, dispatch] = useReducer(themeReducer, initialState);
  const toggleDarkMode = () => {
    dispatch({ type: 'TOGGLE_DARK_MODE' });
  };
  const setFontSize = (size) => {
    dispatch({ type: 'SET_FONT_SIZE', payload: size });
  };
  const contextValue = {
    darkMode: state.darkMode,
    fontSize: state.fontSize,
    toggleDarkMode,
    setFontSize
  };
  return (
    <ThemeContext.Provider value={contextValue}>
      {children}
    </ThemeContext.Provider>
  );
};`,

{title:'Restaurant Context with useReducer',t:'context',points:8,
code:`const RestaurantContext = createContext();

const initialState = {
  restaurants: [],
  loading: false,
  error: null
};

function restaurantReducer(state, action) {
  switch (action.type) {
    case 'LOAD_START':
      return { ...state, loading: true, error: null };
    case 'LOAD_SUCCESS':
      return { ...state, loading: false, restaurants: action.payload };
    case 'LOAD_ERROR':
      return { ...state, loading: false, error: action.payload };
    case 'ADD_RESTAURANT':
      return { ...state,
        restaurants: [...state.restaurants, action.payload] };
    default:
      return state;
  }
}

function RestaurantProvider({ children }) {
  const [state, dispatch] = useReducer(restaurantReducer, initialState);

  const loadRestaurants = useCallback(async () => {
    dispatch({ type: 'LOAD_START' });
    try {
      const data = await api.loadRestaurants();
      dispatch({ type: 'LOAD_SUCCESS', payload: data });
    } catch (e) {
      dispatch({ type: 'LOAD_ERROR', payload: e.message });
    }
  }, []);

  const contextValue = useMemo(() => ({
    ...state,
    loadRestaurants
  }), [state, loadRestaurants]);

  return (
    <RestaurantContext.Provider value={contextValue}>
      {children}
    </RestaurantContext.Provider>
  );
}`,
parts:[
{q:'Why is useCallback used for loadRestaurants and useMemo used for contextValue? What problem do they solve?',
a:`useCallback for loadRestaurants:
- Without it, a new function reference is created every render
- This would cause useEffect hooks depending on it to re-run infinitely
- useCallback with [] deps returns the same function reference across renders

useMemo for contextValue:
- Without it, a new object is created every render ({ ...state, loadRestaurants })
- A new object reference triggers ALL context consumers to re-render, even if state hasn't changed
- useMemo only creates a new object when state or loadRestaurants actually changes

Together they prevent unnecessary re-renders of all components consuming this context.`},
